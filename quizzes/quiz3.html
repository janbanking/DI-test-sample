    <script>
        const QUESTIONS   = [{"number":1,"text":"Kto, zgodnie z przepisami ustawy o obrocie instrumentami finansowymi, może organizować rynek obrotu skarbowymi papierami wartościowymi w rozumieniu ustawy o finansach publicznych oraz instrumentami finansowymi, których instrumentem bazowym jest skarbowy papier wartościowy:","options":{"A":"minister właściwy do spraw budżetu;","B":"Giełda Papierów Wartościowych w Warszawie S.A.;","C":"Komisja Nadzoru Finansowego;","D":"Krajowy Depozyt Papierów Wartościowych Spółka Akcyjna."}},{"number":2,"text":"Zgodnie z przepisami ustawy o funduszach inwestycyjnych i zarządzaniu alternatywnymi funduszami inwestycyjnymi, wskaż podmiot, z którym towarzystwo funduszy inwestycyjnych może zawrzeć umowę o wykonywanie funkcji depozytariusza funduszu inwestycyjnego:","options":{"A":"Krajowy Depozyt Papierów Wartościowych Spółka Akcyjna;","B":"Giełda Papierów Wartościowych w Warszawie S.A.;","C":"inne towarzystwo funduszy inwestycyjnych;","D":"Catalyst."}},{"number":3,"text":"Mając na uwadze postanowienia Regulaminu Krajowego Depozytu Papierów Wartościowych S.A., wskaż zasadę, która nie ma zastosowania do ewidencji papierów wartościowych prowadzonej przez Krajowy Depozyt Papierów Wartościowych S.A.:","options":{"A":"zasada przejrzystości;","B":"zasada odrębnej rejestracji papierów wartościowych;","C":"zasada nieuwzględniania typów uczestnictwa;","D":"zasada jednoczesności zapisów."}},{"number":4,"text":"Mając na uwadze przepisy ustawy o Narodowym Banku Polskim, wskaż stwierdzenie fałszywe. W wykonaniu swoich zadań Narodowy Bank Polski współdziała z właściwymi organami państwa w kształtowaniu i realizacji polityki gospodarczej państwa, dążąc przy tym do zapewnienia należytej realizacji założeń polityki pieniężnej, a w szczególności:","options":{"A":"przekazuje organom państwa założenia polityki pieniężnej oraz informacje dotyczące realizacji polityki pieniężnej i sytuacji w systemie bankowym;","B":"współdziała z Prezesem Rady Ministrów w opracowaniu planów finansowych państwa;","C":"opiniuje projekty aktów normatywnych z zakresu polityki gospodarczej;","D":"opiniuje projekty aktów normatywnych dotyczących działalności banków i mających znaczenie dla systemu bankowego."}},{"number":5,"text":"Na podstawie MSR 8 \"Zasady (polityka) rachunkowości, zmiany wartości szacunkowych i korygowanie błędów\", zatwierdzonego przez UE, wskaż stwierdzenie fałszywe:","options":{"A":"\"wartości szacunkowe\" są to kwoty pieniężne w sprawozdaniu finansowym, które podlegają niepewności wyceny;","B":"przykładem wartości szacunkowej jest odpis na oczekiwane straty kredytowe w zastosowaniu MSSF 9 \"Instrumenty finansowe\";","C":"zmiana wartości szacunkowej z założenia odnosi się do poprzednich okresów oraz stanowi korektę błędu;","D":"w przypadku trudności w odróżnieniu zmiany zasad (polityki) rachunkowości od zmiany wartości szacunkowej zmianę traktuje się jako zmianę wartości szacunkowej."}},{"number":6,"text":"Zgodnie z Rozporządzeniem Ministra Finansów w sprawie szczególnych zasad rachunkowości banków, prawdą jest, że:","options":{"A":"aktywa i zobowiązania finansowe, a także zobowiązania pozabilansowe, ujmowane są w księgach rachunkowych na dzień zawarcia transakcji;","B":"zdematerializowane papiery wartościowe nienotowane na rynku regulowanym oraz w alternatywnym systemie obrotu, należące do klientów, zapisane na rachunkach papierów wartościowych, wycenia się według wartości godziwej;","C":"zabezpieczenie inwestycji netto w podmiocie zagranicznym rozlicza się w sposób przewidziany dla zabezpieczeń wartości godziwej;","D":"w przypadku zbycia inwestycji netto w podmiocie zagranicznym skutki wyceny instrumentu zabezpieczającego, odnoszące się do części zabezpieczenia uznanego za skuteczne, ujmuje się odpowiednio w zyskach nadzwyczajnych lub stratach nadzwyczajnych."}},{"number":7,"text":"Mając na uwadze przepisy ustawy – Kodeks spółek handlowych, wskaż stwierdzenie prawdziwe:","options":{"A":"akcjonariusz spółki komandytowo-akcyjnej nie odpowiada za zobowiązania spółki;","B":"akcjonariusz spółki komandytowo-akcyjnej odpowiada za zobowiązania spółki;","C":"akcjonariusz spółki komandytowo-akcyjnej odpowiada wyłącznie za zobowiązania podatkowe spółki;","D":"Kodeks spółek handlowych nie reguluje kwestii odpowiedzialności akcjonariusza spółki komandytowo-akcyjnej za zobowiązania spółki."}},{"number":8,"text":"Zgodnie z postanowieniami Kodeksu Dobrej Praktyki Domów Maklerskich, dom maklerski, jako profesjonalny pośrednik w obrocie instrumentami finansowymi:","options":{"A":"nie może wykorzystywać swojej uprzywilejowanej pozycji;","B":"nie może wykorzystywać swojej uprzywilejowanej pozycji, ale przy podejmowaniu decyzji inwestycyjnych na własny rachunek może wykorzystywać informacje o obrotach klientów oraz inne dane dotyczące klientów;","C":"nie może wykorzystywać swojej uprzywilejowanej pozycji, ale przy podejmowaniu decyzji inwestycyjnych na własny rachunek może wykorzystywać informacje o zleceniach klientów oraz inne dane dotyczące klientów;","D":"nie może wykorzystywać swojej uprzywilejowanej pozycji, ale przy podejmowaniu decyzji inwestycyjnych na własny rachunek może wykorzystywać informacje o stanach, obrotach i zleceniach klientów."}},{"number":9,"text":"Przepisy ustawy – Kodeks cywilny o sprzedaży rzeczy stosuje się odpowiednio:","options":{"A":"wyłącznie do sprzedaży energii;","B":"do sprzedaży energii, praw oraz wody;","C":"wyłącznie do sprzedaży energii oraz wody;","D":"wyłącznie do sprzedaży praw oraz wody."}},{"number":10,"text":"Mając na uwadze przepisy ustawy o nadzorze nad rynkiem finansowym, wskaż stwierdzenie prawdziwe:","options":{"A":"Przewodniczący Komisji Nadzoru Finansowego nadaje Urzędowi Komisji Nadzoru Finansowego statut zarządzeniem wewnętrznym;","B":"Prezes Rady Ministrów, w drodze zarządzenia, nadaje Urzędowi Komisji Nadzoru Finansowego statut, w którym określa jego organizację wewnętrzną;","C":"minister właściwy do spraw budżetu, w drodze rozporządzenia, nadaje Urzędowi Komisji Nadzoru Finansowego statut;","D":"uchwalenie statutu Urzędu Komisji Nadzoru Finansowego należy do zadań Komisji Nadzoru Finansowego."}},{"number":11,"text":"Na podstawie ustawy o rachunkowości, wskaż stwierdzenie fałszywe:","options":{"A":"dzień bilansowy to dzień, na który jednostka sporządza sprawozdanie finansowe;","B":"aktywa netto to aktywa jednostki pomniejszone o zobowiązania, odpowiadające wartościowo kapitałowi (funduszowi) własnemu;","C":"kapitały mniejszości to część aktywów jednostki zależnej, objętej skonsolidowanym sprawozdaniem finansowym, która należy do udziałowców innych niż jednostki grupy kapitałowej;","D":"grupa kapitałowa to jednostka dominująca wraz z jednostkami zależnymi i jednostkami stowarzyszonymi."}},{"number":12,"text":"Mając na uwadze przepisy ustawy – Kodeks spółek handlowych, wskaż stwierdzenie prawdziwe:","options":{"A":"umowa spółki jawnej nie może przewidywać, że wspólnik jest pozbawiony prawa reprezentowania spółki albo że jest uprawniony do jej reprezentowania tylko łącznie z innym wspólnikiem lub prokurentem;","B":"umowa spółki jawnej musi przewidywać, że jeden wspólnik jest pozbawiony prawa reprezentowania spółki;","C":"umowa spółki jawnej może przewidywać, że wspólnik jest pozbawiony prawa reprezentowania spółki albo że jest uprawniony do jej reprezentowania tylko łącznie z innym wspólnikiem lub prokurentem;","D":"umowa spółki jawnej musi przewidywać, że jeden wspólnik jest uprawniony do reprezentowania spółki tylko łącznie z innym wspólnikiem lub prokurentem."}},{"number":13,"text":"Zgodnie z przepisami ustawy o obrocie instrumentami finansowymi, wskaż kto dokonuje wpisu na listę doradców inwestycyjnych:","options":{"A":"Komisja Nadzoru Finansowego;","B":"Dyrektor Generalny Komisji Nadzoru Finansowego;","C":"Komisja Egzaminacyjna dla Doradców Inwestycyjnych;","D":"Przewodniczący Komisji Egzaminacyjnej dla Doradców Inwestycyjnych."}},{"number":14,"text":"Zgodnie z przepisami ustawy o obrocie instrumentami finansowymi, dom maklerski staje się uczestnikiem systemu rekompensat z chwilą:","options":{"A":"udzielenia mu przez Komisję Nadzoru Finansowego zezwolenia na prowadzenie działalności maklerskiej;","B":"upływu 10 dni od daty udzielenia mu przez Komisję Nadzoru Finansowego zezwolenia na prowadzenie działalności maklerskiej;","C":"upływu 5 dni od daty udzielenia mu przez Komisję Nadzoru Finansowego zezwolenia na prowadzenie działalności maklerskiej;","D":"upływu 10 dni od daty doręczenia mu zezwolenia na prowadzenie działalności maklerskiej udzielonego przez Komisję Nadzoru Finansowego."}},{"number":15,"text":"Na podstawie MSR 28 \"Inwestycje w jednostkach stowarzyszonych i wspólnych przedsięwzięciach\", zatwierdzonego przez UE, wskaż stwierdzenie fałszywe:","options":{"A":"\"jednostka stowarzyszona\" jest to jednostka, nad którą inwestor sprawuje kontrolę;","B":"stosując metodę praw własności, inwestycje ujmuje się zgodnie z tą metodą od dnia, w którym dana jednostka spełnia wymogi definicji jednostki stowarzyszonej lub wspólnego przedsięwzięcia;","C":"stosując metodę praw własności, wartość firmy dotyczącą jednostki stowarzyszonej lub wspólnego przedsięwzięcia ujmuje się w wartości bilansowej inwestycji;","D":"amortyzacja wartości firmy dotyczącej jednostki stowarzyszonej lub wspólnego przedsięwzięcia, powstałej przy zastosowaniu metody praw własności, nie jest dozwolona."}},{"number":16,"text":"Zgodnie z przepisami ustawy – Prawo bankowe, bank informuje Komisję Nadzoru Finansowego o zamierzonym programie emisji papierów wartościowych wskazując warunki i wartość programu emisji:","options":{"A":"na 30 dni przed terminem emisji;","B":"niezwłocznie;","C":"na 60 dni przed terminem emisji;","D":"w dniu rozpoczęcia emisji."}},{"number":17,"text":"Zgodnie z rozporządzeniem Ministra Rozwoju i Finansów w sprawie określenia szczegółowych warunków technicznych i organizacyjnych dla firm inwestycyjnych, banków, o których mowa w art. 70 ust. 2 ustawy o obrocie instrumentami finansowymi, i banków powierniczych, firma inwestycyjna świadcząca usługi przechowywania lub rejestrowania instrumentów finansowych oraz prowadzenia rachunków pieniężnych jest obowiązana do:","options":{"A":"przechowywania lub rejestrowania aktywów klienta w taki sposób, aby możliwe było w każdej chwili wyodrębnienie aktywów przechowywanych na rzecz jednego klienta od aktywów innego klienta oraz od aktywów własnych firmy inwestycyjnej;","B":"przechowywania lub rejestrowania aktywów klienta w taki sposób, aby możliwe było raz na miesiąc wyodrębnienie aktywów przechowywanych na rzecz jednego klienta od aktywów innego klienta oraz od aktywów własnych firmy inwestycyjnej;","C":"przechowywania lub rejestrowania aktywów klienta w taki sposób, aby możliwe było w każdej chwili, ale nie częściej niż raz na miesiąc, wyodrębnienie aktywów przechowywanych na rzecz jednego klienta od aktywów innego klienta oraz od aktywów własnych firmy inwestycyjnej;","D":"przechowywania lub rejestrowania aktywów klienta w taki sposób, aby możliwe było, w pierwszy dzień każdego kwartału, wyodrębnienie aktywów przechowywanych na rzecz jednego klienta od aktywów innego klienta oraz od aktywów własnych firmy inwestycyjnej."}},{"number":18,"text":"Zgodnie z przepisami ustawy – Kodeks cywilny, jeżeli kupujący dopuścił się zwłoki z odebraniem rzeczy sprzedanej:","options":{"A":"sprzedawca musi oddać rzecz na przechowanie na koszt i niebezpieczeństwo kupującego;","B":"sprzedawca może oddać rzecz na przechowanie na koszt i niebezpieczeństwo kupującego;","C":"sprzedawca pod żadnym warunkiem nie może oddać rzeczy na przechowanie na koszt i niebezpieczeństwo kupującego;","D":"sprzedawca niezwłocznie wystawia rzecz do ponownego sprzedania."}},{"number":19,"text":"Mając na uwadze przepisy ustawy o Narodowym Banku Polskim, wskaż stwierdzenie fałszywe:","options":{"A":"Narodowy Bank Polski nie posiada osobowości prawnej;","B":"Narodowy Bank Polski nie podlega wpisowi do rejestru przedsiębiorstw państwowych;","C":"działalność Narodowego Banku Polskiego jest prowadzona na obszarze Rzeczypospolitej Polskiej;","D":"siedzibą Narodowego Banku Polskiego jest Warszawa."}},{"number":20,"text":"Zgodnie z przepisami ustawy o funduszach inwestycyjnych i zarządzaniu alternatywnymi funduszami inwestycyjnymi, wskaż, co nie należy do celów inwestycyjnych funduszu inwestycyjnego otwartego:","options":{"A":"ochrona realnej wartości aktywów funduszu inwestycyjnego;","B":"osiąganie przychodów z lokat netto funduszu inwestycyjnego;","C":"wzrost wartości aktywów funduszu inwestycyjnego w wyniku wzrostu wartości lokat;","D":"systematyczne zwiększanie liczby uczestników."}},{"number":21,"text":"Zgodnie z MSR 40 \"Nieruchomości inwestycyjne\", zatwierdzonym przez UE, nieruchomość inwestycyjną posiadaną na własność początkowo wycenia się według:","options":{"A":"wartości godziwej;","B":"wartości przeszacowanej;","C":"wartości netto możliwej do uzyskania;","D":"ceny nabycia lub kosztu wytworzenia. Przy początkowej wycenie uwzględnia się koszty przeprowadzenia transakcji."}},{"number":22,"text":"Zgodnie z przepisami ustawy o obrocie instrumentami finansowymi, wskaż kto może skreślić doradcę inwestycyjnego z listy doradców inwestycyjnych:","options":{"A":"Komisja Nadzoru Finansowego;","B":"Dyrektor Generalny Komisji Nadzoru Finansowego;","C":"Komisja Egzaminacyjna dla Doradców Inwestycyjnych;","D":"Przewodniczący Komisji Egzaminacyjnej dla Doradców Inwestycyjnych."}},{"number":23,"text":"Zgodnie z przepisami ustawy – Kodeks cywilny, jeżeli pełnomocnik po wygaśnięciu umocowania dokona w imieniu mocodawcy czynności prawnej w granicach pierwotnego umocowania, to:","options":{"A":"czynność prawna nigdy nie może zostać uznana za ważną;","B":"czynność prawna jest ważna, chyba że druga strona o wygaśnięciu umocowania wiedziała lub z łatwością mogła się dowiedzieć;","C":"czynność prawna zawsze jest ważna;","D":"czynność prawna jest ważna wyłącznie po wyrażeniu odrębnego potwierdzenia przez mocodawcę w terminie 5 dni od daty wykonania tej czynności prawnej."}},{"number":24,"text":"Zgodnie z przepisami ustawy – Kodeks spółek handlowych, do powstania spółki akcyjnej wymaga się spełnienia czterech wymogów. Którego z przedstawionych wymogów do takich się nie zalicza:","options":{"A":"zawiązanie spółki, w tym podpisanie statutu przez założycieli;","B":"wniesienie przez akcjonariuszy wkładów na pokrycie całego kapitału zakładowego, z uwzględnieniem zasad dotyczących terminów pokrywania akcji obejmowanych za wkłady pieniężne oraz niepieniężne;","C":"ustanowienie wyłącznie zarządu, tj. bez obowiązku ustanowienia rady nadzorczej;","D":"wpis do rejestru."}},{"number":25,"text":"Zgodnie z postanowieniami Kodeksu Dobrej Praktyki Domów Maklerskich, przy zarządzaniu portfelem na zlecenie klienta dom maklerski zobowiązany jest:","options":{"A":"do udzielania na każde żądanie klienta lub jego pełnomocnika w granicach umocowania, informacji dotyczących stanu jego portfela oraz operacji dokonanych w ramach zarządzania, o ile umowa o zarządzanie nie stanowi inaczej;","B":"do udzielania wyłącznie pełnomocnikowi klienta informacji dotyczących stanu jego portfela oraz operacji dokonanych w ramach zarządzania;","C":"do udzielania na każde żądanie pełnomocnika klienta wyłącznie informacji dotyczących operacji dokonanych w ramach zarządzania;","D":"do udzielania na każde żądanie klienta lub jego pełnomocnika w granicach umocowania wyłącznie informacji dotyczących stanu jego portfela."}},{"number":26,"text":"Zgodnie z ustawą o rachunkowości, w przypadku rozliczenia połączenia spółek handlowych metodą nabycia:","options":{"A":"kapitał (fundusz) własny spółki przejętej ustalony na dzień połączenia jako aktywa netto według wartości godziwej podlega wyłączeniu;","B":"w bilansie połączonych spółek wyłączeniu nie podlegają wzajemne należności i zobowiązania;","C":"nadwyżka ceny przejęcia nad wartością godziwą aktywów netto spółki przejętej wykazywana jest w pasywach spółki, na którą przeszedł majątek połączonych spółek, jako ujemna wartość firmy;","D":"odpisów amortyzacyjnych od wartości firmy dokonuje się metodą liniową i zalicza się je do pozostałych przychodów operacyjnych."}},{"number":27,"text":"Mając na uwadze przepisy ustawy o nadzorze nad rynkiem kapitałowym wskaż, co nie należy do zadań Komisji Nadzoru Finansowego:","options":{"A":"podejmowanie działań służących prawidłowemu funkcjonowaniu rynku kapitałowego;","B":"sprawowanie nadzoru nad działalnością podmiotów nadzorowanych oraz wykonywaniem przez te podmioty obowiązków związanych z ich uczestnictwem w obrocie na rynku kapitałowym, w zakresie określonym przepisami prawa;","C":"podejmowanie działań edukacyjnych i informacyjnych w zakresie funkcjonowania rynku kapitałowego;","D":"wykonywanie wyłącznie zadań określonych przez Ministra Finansów."}},{"number":28,"text":"Czy, zgodnie z postanowieniami Kodeksu Dobrej Praktyki Domów Maklerskich, członek Izby Domów Maklerskich (IDM) zobowiązany jest poinformować klientów i podmioty współpracujące o fakcie, że jego działalność podlega zasadom Kodeksu Dobrej Praktyki Domów Maklerskich?","options":{"A":"nie;","B":"tak – co najmniej poprzez wywieszenie stosownej informacji w swojej siedzibie (centrali) i Punktach Obsługi Klientów oraz swojej stronie internetowej;","C":"tak – wyłącznie poprzez wywieszenie stosownej informacji na swojej stronie internetowej;","D":"tak – wyłącznie poprzez wywieszenie stosownej informacji w swojej siedzibie (centrali)."}},{"number":29,"text":"Zgodnie z przepisami ustawy o nadzorze nad rynkiem finansowym, w sprawach cywilnych wynikających ze stosunków związanych z uczestnictwem w obrocie na rynku finansowym albo dotyczących podmiotów wykonujących działalność na tym rynku uprawnienia prokuratora wynikające z przepisów ustawy - Kodeks postępowania cywilnego przysługują:","options":{"A":"Przewodniczącemu Komisji Nadzoru Finansowego;","B":"Zastępcy Przewodniczącego Komisji Nadzoru Finansowego;","C":"Komisji Nadzoru Finansowego;","D":"Zastępcom Przewodniczącego Komisji Nadzoru Finansowego."}},{"number":30,"text":"Zgodnie z przepisami ustawy o giełdach towarowych, wskaż czego ustawa nie wymienia jako cel działania spółki prowadzącej giełdę towarową:","options":{"A":"koncentracja podaży i popytu na towary giełdowe;","B":"zapewnienie bezpiecznego i sprawnego przebiegu transakcji giełdowych i rozliczeń;","C":"upowszechnianie jednolitych informacji umożliwiających ocenę aktualnej wartości towarów giełdowych;","D":"obsługa klientów detalicznych."}}];
        const ANSWER_KEY  = {"1": "A", "2": "A", "3": "C", "4": "B", "5": "C", "6": "A", "7": "A", "8": "A", "9": "B", "10": "B", "11": "D", "12": "C", "13": "A", "14": "A", "15": "A", "16": "A", "17": "A", "18": "B", "19": "A", "20": "D", "21": "D", "22": "A", "23": "B", "24": "C", "25": "A", "26": "A", "27": "D", "28": "B", "29": "C", "30": "D"};
        const EXPLANATIONS = {"1": "Art. 94 ust. 1 ustawy o obrocie instrumentami finansowymi stanowi, że minister właściwy do spraw budżetu może organizować rynek obrotu skarbowymi papierami wartościowymi w rozumieniu ustawy o finansach publicznych oraz instrumentami finansowymi, których instrumentem bazowym jest skarbowy papier wartościowy. Kompetencja ta wynika ze szczególnej roli Ministra Finansów jako emisariusza obligacji skarbowych i zarządcy długiem publicznym.", "2": "Art. 72 ust. 1 ustawy o funduszach inwestycyjnych stanowi, że depozytariuszem funduszu inwestycyjnego może być wyłącznie bank mający siedzibę na terytorium RP z kapitałem własnym co najmniej 100 mln zł lub Krajowy Depozyt Papierów Wartościowych S.A. Towarzystwo FI (C) nie może być depozytariuszem zarządzanych przez siebie funduszy ze względu na conflict of interest. Catalyst (D) to platforma obrotu, nie podmiot świadczący usługi depozytariusza.", "3": "Regulamin KDPW określa następujące zasady mające zastosowanie do ewidencji PW: zasada przejrzystości, zasada odrębnej rejestracji papierów wartościowych, zasada jednoczesności zapisów oraz zasada zgodności sald. \"Zasada nieuwzględniania typów uczestnictwa\" nie jest jedną z zasad wymienionych w Regulaminie KDPW – jej nazwa sugeruje coś odwrotnego do faktycznej zasady, zgodnie z którą typy uczestnictwa mają znaczenie dla praw i obowiązków uczestników.", "4": "Art. 17 ust. 1 ustawy o Narodowym Banku Polskim stanowi, że NBP współdziała z właściwymi organami państwa, a w zakresie przygotowania budżetu państwa – z ministrem właściwym do spraw finansów publicznych, a nie z Prezesem Rady Ministrów. Opcja B twierdzi, że NBP współdziała z Prezesem RM w opracowaniu planów finansowych państwa – jest to fałszywe, ponieważ właściwym organem jest minister finansów.", "5": "MSR 8 par. 32 wyraźnie rozróżnia zmianę zasad (polityki) rachunkowości od zmiany wartości szacunkowej. Zmiana wartości szacunkowej (par. 36-38) jest ujmowana prospektywnie – nie odnosi się do poprzednich okresów i z definicji nie stanowi korekty błędu. Stwierdzenie C jest zatem fałszywe. Błędy (par. 41-42) są kategorią odrębną i wymagają korekty retrospektywnej.", "6": "Rozporządzenie Ministra Finansów w sprawie szczególnych zasad rachunkowości banków stanowi, że aktywa i zobowiązania finansowe, a także zobowiązania pozabilansowe, ujmowane są w księgach rachunkowych na dzień zawarcia transakcji (trade date accounting). Jest to odejście od ogólnej zasady memoriałowej i wynika ze specyfiki instrumentów finansowych, gdzie prawa i obowiązki powstają z chwilą zawarcia umowy.", "7": "Art. 135 KSH stanowi, że akcjonariusz spółki komandytowo-akcyjnej nie odpowiada za zobowiązania spółki. W spółce k-a za zobowiązania odpowiadają wyłącznie komplementariusze (bez ograniczeń, całym swoim majątkiem). Akcjonariusze wnoszą kapitał, ale nie ponoszą odpowiedzialności osobistej – jest to jedna z kluczowych różnic między S.K.A. a spółką komandytową, gdzie komandytariusz odpowiada do wysokości sumy komandytowej.", "8": "Kodeks Dobrej Praktyki Domów Maklerskich stanowi, że dom maklerski jako profesjonalny pośrednik nie może wykorzystywać swojej uprzywilejowanej pozycji. Oznacza to całkowity zakaz wykorzystywania informacji o zleceniach, stanach i obrotach klientów przy podejmowaniu własnych decyzji inwestycyjnych. Opcje B, C i D błędnie sugerują, że DM może korzystać z pewnych kategorii informacji klientowskich we własnym obrocie – jest to niedopuszczalne.", "9": "Art. 555 KC stanowi, że przepisy o sprzedaży rzeczy stosuje się odpowiednio do sprzedaży energii, praw oraz wody. Katalog ten jest enumeratywny – wymienione są trzy kategorie: energia, prawa i woda. Opcja A (tylko energia) i opcja D (tylko prawa i woda) podają niekompletne wyliczenia, a opcja C (tylko energia i woda) pomija prawa.", "10": "Art. 17 ust. 5 ustawy o nadzorze nad rynkiem finansowym stanowi, że Prezes Rady Ministrów, w drodze zarządzenia, nadaje Urzędowi Komisji Nadzoru Finansowego statut, w którym określa jego organizację wewnętrzną. Jest to kompetencja Prezesa RM – nie Przewodniczącego KNF (A), nie ministra finansów (C) ani samej Komisji (D). Statut nadawany zarządzeniem RM zapewnia niezależność UKNF od jego własnego kierownictwa.", "11": "Art. 3 ust. 1 pkt 44 ustawy o rachunkowości definiuje grupę kapitałową jako jednostkę dominującą wraz z jednostkami zależnymi. Definicja ta nie obejmuje jednostek stowarzyszonych – są one ujmowane metodą praw własności w skonsolidowanym sprawozdaniu, ale nie wchodzą w skład grupy kapitałowej. Odpowiedź D twierdząca, że grupa kapitałowa obejmuje jednostki stowarzyszone, jest zatem fałszywa.", "12": "Art. 30 §1 KSH stanowi, że umowa spółki jawnej może przewidywać, że wspólnik jest pozbawiony prawa reprezentowania spółki albo że jest uprawniony do jej reprezentowania tylko łącznie z innym wspólnikiem lub prokurentem. Jest to uprawnienie do modyfikacji zasady domyślnej (każdy wspólnik może samodzielnie reprezentować spółkę). Opcja A błędnie twierdzi, że taka modyfikacja jest niemożliwa, a opcje B i D sugerują obowiązkowość pewnych rozwiązań.", "13": "Art. 124 ust. 4 ustawy o obrocie instrumentami finansowymi stanowi, że wpisu osoby fizycznej na listę doradców inwestycyjnych dokonuje Komisja Nadzoru Finansowego. Jest to decyzja administracyjna wydawana przez KNF jako organ kolegialny – nie przez Dyrektora Generalnego UKNF (B) ani przez Komisję Egzaminacyjną (C, D), która jest organem przeprowadzającym egzaminy, a nie prowadzącym listę.", "14": "Art. 133 ust. 1 ustawy o obrocie instrumentami finansowymi stanowi, że dom maklerski staje się uczestnikiem systemu rekompensat z chwilą udzielenia mu przez Komisję Nadzoru Finansowego zezwolenia na prowadzenie działalności maklerskiej. Uczestnictwo w systemie rekompensat jest obligatoryjne i automatyczne – powstaje z mocy prawa w momencie udzielenia zezwolenia, bez potrzeby oczekiwania (opcje B, C, D błędnie wskazują na termin odroczony).", "15": "MSR 28 par. 3 definiuje jednostkę stowarzyszoną jako jednostkę, na którą inwestor wywiera znaczący wpływ, ale nad którą nie sprawuje kontroli. Sprawowanie kontroli charakteryzuje zależność (subsidiary), a nie stowarzyszenie. Opcja A twierdzi, że jednostka stowarzyszona to taka, nad którą inwestor sprawuje kontrolę – jest to błędne (kontrola = jednostka zależna). Dlatego opcja A jest stwierdzeniem fałszywym.", "16": "Art. 89 ust. 3 Prawa bankowego stanowi, że bank informuje Komisję Nadzoru Finansowego o zamierzonym programie emisji papierów wartościowych, wskazując warunki i wartość programu emisji, na 30 dni przed terminem emisji. Termin 30-dniowy umożliwia KNF weryfikację warunków emisji i podjęcie ewentualnych działań nadzorczych przed jej rozpoczęciem.", "17": "Rozporządzenie MF w sprawie szczegółowych warunków technicznych i organizacyjnych dla firm inwestycyjnych stanowi, że firma inwestycyjna przechowuje lub rejestruje aktywa klienta w taki sposób, aby możliwe było w każdej chwili wyodrębnienie aktywów jednego klienta od aktywów innego klienta oraz od aktywów własnych firmy. Wymóg \"w każdej chwili\" jest kluczowy – zapewnia ochronę klientów w każdym momencie, nie tylko okresowo (B, C) lub kwartalnie (D).", "18": "Art. 551 KC stanowi, że jeżeli kupujący dopuścił się zwłoki z odebraniem rzeczy sprzedanej, sprzedawca może oddać rzecz na przechowanie na koszt i niebezpieczeństwo kupującego. Jest to uprawnienie sprzedawcy (\"może\"), a nie obowiązek (\"musi\" – opcja A). Prawo to chroni sprzedawcę przed kosztami przechowania rzeczy, którą kupujący niezasadnie odmawia odebrania.", "19": "Art. 2 ust. 1 ustawy o Narodowym Banku Polskim stanowi wprost, że Narodowy Bank Polski posiada osobowość prawną. Oznacza to, że NBP jest odrębnym podmiotem prawa – może nabywać prawa i zaciągać zobowiązania we własnym imieniu. Stwierdzenie A, że NBP nie posiada osobowości prawnej, jest zatem fałszywe.", "20": "Art. 3 ustawy o funduszach inwestycyjnych określa cele inwestycyjne FIO: ochrona realnej wartości aktywów (A), osiąganie przychodów z lokat netto (B) i wzrost wartości aktywów w wyniku wzrostu wartości lokat (C). \"Systematyczne zwiększanie liczby uczestników\" nie jest celem inwestycyjnym FIO – jest to cel handlowy/marketingowy, a nie ustawowy cel funduszu inwestycyjnego.", "21": "MSR 40 par. 20 stanowi, że nieruchomość inwestycyjną posiadaną na własność ujmuje się początkowo według ceny nabycia lub kosztu wytworzenia. Przy wycenie początkowej uwzględnia się koszty przeprowadzenia transakcji (np. opłaty notarialne, podatek od czynności cywilnoprawnych). Dopiero po początkowym ujęciu jednostka może wybrać model wartości godziwej lub model kosztu do późniejszej wyceny.", "22": "Art. 124 ust. 5 ustawy o obrocie instrumentami finansowymi stanowi, że skreślenia doradcy inwestycyjnego z listy dokonuje Komisja Nadzoru Finansowego. Analogicznie jak przy wpisie na listę, organem właściwym jest KNF – nie Dyrektor Generalny UKNF ani Komisja Egzaminacyjna. Skreślenie z listy jest decyzją administracyjną, która może nastąpić np. na wniosek DI lub z urzędu.", "23": "Art. 105 KC stanowi, że jeżeli pełnomocnik po wygaśnięciu umocowania dokona w imieniu mocodawcy czynności prawnej w granicach pierwotnego umocowania, czynność prawna jest ważna, chyba że druga strona o wygaśnięciu umocowania wiedziała lub z łatwością mogła się dowiedzieć. Zasada ta chroni bezpieczeństwo obrotu i osoby trzecie działające w dobrej wierze. Czynność jest więc co do zasady ważna – ale z możliwością powołania się na wygaśnięcie przez drugą stronę.", "24": "Art. 306 KSH wymaga do powstania SA: (1) zawiązania spółki (podpisanie statutu), (2) wniesienia przez akcjonariuszy wkładów na pokrycie kapitału zakładowego, (3) ustanowienia zarządu I rady nadzorczej (obie są obowiązkowe w SA – art. 381 KSH), (4) wpisu do rejestru. Opcja C twierdzi, że wystarczy ustanowienie \"wyłącznie zarządu\" bez rady nadzorczej – jest to błędne, rada nadzorcza jest obowiązkowa w SA.", "25": "Kodeks Dobrej Praktyki Domów Maklerskich stanowi, że przy zarządzaniu portfelem DM jest zobowiązany do udzielania na każde żądanie klienta lub jego pełnomocnika (w granicach umocowania) informacji dotyczących stanu portfela oraz operacji dokonanych w ramach zarządzania, o ile umowa o zarządzanie nie stanowi inaczej. Dostęp do informacji jest prawem zarówno klienta, jak i jego pełnomocnika, bez rozróżnienia na jedną lub drugą kategorię (opcje B, C, D niesłusznie zawężają to prawo).", "26": "Ustawa o rachunkowości (art. 44b) stanowi, że przy metodzie nabycia, kapitał własny spółki przejętej ustalony na dzień połączenia jako aktywa netto według wartości godziwej podlega wyłączeniu przy sporządzaniu łącznego bilansu. Jest to fundamentalna zasada metody nabycia – eliminacja kapitału jednostki przejętej w zamian za wykazanie przejętych aktywów i zobowiązań według wartości godziwej oraz ewentualnej wartości firmy.", "27": "Ustawa o nadzorze nad rynkiem kapitałowym określa zadania KNF: podejmowanie działań dla prawidłowego funkcjonowania rynku (A), sprawowanie nadzoru nad podmiotami nadzorowanymi (B) i działania edukacyjne/informacyjne (C). KNF jest niezależnym organem administracji publicznej – wykonywanie wyłącznie zadań określonych przez Ministra Finansów (D) jest całkowicie sprzeczne z jej statusem i ustawowymi kompetencjami.", "28": "Kodeks Dobrej Praktyki Domów Maklerskich nakłada na członka IDM obowiązek informowania klientów i podmiotów współpracujących o fakcie podlegania zasadom Kodeksu co najmniej poprzez wywieszenie stosownej informacji w siedzibie (centrali) i Punktach Obsługi Klientów oraz na swojej stronie internetowej. Minimalny standard jest zatem trójkanałowy: siedziba, POK i strona internetowa. Opcja C (tylko strona internetowa) i D (tylko siedziba) są niewystarczające.", "29": "Art. 6 ust. 2 ustawy o nadzorze nad rynkiem finansowym stanowi, że w sprawach cywilnych wynikających ze stosunków związanych z uczestnictwem w obrocie na rynku finansowym uprawnienia prokuratora przysługują Komisji Nadzoru Finansowego. Uprawnienia te pozwalają KNF na aktywne uczestnictwo w postępowaniach cywilnych dotyczących rynku finansowego, np. wnoszenie pozwów czy zaskarżanie uchwał.", "30": "Ustawa o giełdach towarowych (art. 16 ust. 1) określa cele spółki prowadzącej giełdę towarową: koncentrację podaży i popytu na towary giełdowe (A), zapewnienie bezpiecznego i sprawnego przebiegu transakcji (B) oraz upowszechnianie jednolitych informacji umożliwiających ocenę wartości towarów giełdowych (C). Obsługa klientów detalicznych (D) nie jest ustawowym celem giełdy towarowej – giełdy są platformami hurtowymi dla profesjonalnych uczestników rynku."};
        const PASS_SCORE  = 40;
        const CORRECT_PTS = 2;
        const WRONG_PTS   = -1;

        let idx = 0;
        let ans = {};

        function display() {
            const q  = QUESTIONS[idx];
            const ak = JSON.parse(localStorage.getItem('answerKey')) || ANSWER_KEY;
            const selected = ans[idx];

            document.getElementById('currentQuestion').textContent = idx + 1;
            document.getElementById('progressFill').style.width =
                ((idx + 1) / QUESTIONS.length * 100) + '%';
            document.getElementById('questionText').textContent = q.text;

            let html = '';
            for (const [key, val] of Object.entries(q.options)) {
                const isSel  = selected === key;
                const cor    = ak[q.number];
                let cls = '';
                if (selected !== undefined && isSel)
                    cls = (key === cor) ? 'correct' : 'incorrect';

                const fb = (selected !== undefined && isSel)
                    ? `<span class="feedback">${key === cor ? '&#10003; Poprawnie' : '&#10007; Źle'}</span>`
                    : '';

                html += `
                    <div class="option ${cls} ${selected !== undefined ? 'answered' : ''}"
                         ${selected === undefined ? `data-key="${key}"` : ''}>
                        <span class="option-marker">${isSel ? (key === cor ? '&#10003;' : '&#10007;') : '&#9675;'}</span>
                        <span class="option-text">${key}: ${val}</span>
                        ${fb}
                    </div>`;
            }
            document.getElementById('optionsContainer').innerHTML = html;

            // Show explanation if wrong answer was selected
            const expBox = document.getElementById('explanationBox');
            if (selected !== undefined) {
                const cor = ak[q.number];
                if (selected !== cor && EXPLANATIONS[q.number]) {
                    expBox.innerHTML = '<span class="exp-label">Wyjaśnienie:</span> ' + EXPLANATIONS[q.number] + ' <em>Prawidłowa odpowiedź: <strong>' + cor + '</strong>.</em>';
                    expBox.classList.remove('hidden');
                } else {
                    expBox.innerHTML = '';
                    expBox.classList.add('hidden');
                }
            } else {
                expBox.innerHTML = '';
                expBox.classList.add('hidden');
            }

            document.getElementById('prevBtn').disabled = idx === 0;
            const last = idx === QUESTIONS.length - 1;
            document.getElementById('nextBtn').style.display   = last ? 'none'  : 'block';
            document.getElementById('finishBtn').style.display = last ? 'block' : 'none';
        }

        let pickLocked = false;
        function pick(key) {
            if (pickLocked) return;
            pickLocked = true;
            ans[idx] = key;
            display();
            setTimeout(() => { pickLocked = false; }, 300);
        }

        document.getElementById('prevBtn').addEventListener('click', function(e) {
            if (!e.isTrusted) return;
            if (idx > 0) { idx--; display(); }
        });
        document.getElementById('nextBtn').addEventListener('click', function(e) {
            if (!e.isTrusted) return;
            if (idx < QUESTIONS.length - 1) { idx++; display(); }
        });
        document.getElementById('finishBtn').addEventListener('click', function(e) {
            if (!e.isTrusted) return;
            finishQuiz();
        });

        document.getElementById('optionsContainer').addEventListener('click', function(e) {
            if (!e.isTrusted) return;
            const opt = e.target.closest('.option[data-key]');
            if (opt) pick(opt.dataset.key);
        });

        function finishQuiz() {
            const ak = JSON.parse(localStorage.getItem('answerKey')) || ANSWER_KEY;
            let correct = 0, wrong = 0, blank = 0;
            QUESTIONS.forEach((q, i) => {
                const u = ans[i], c = ak[q.number];
                if (!u) blank++; else if (u === c) correct++; else wrong++;
            });
            const score  = correct * CORRECT_PTS + wrong * WRONG_PTS;
            const max    = QUESTIONS.length * CORRECT_PTS;
            const passed = score >= PASS_SCORE;

            document.getElementById('resultStatus').textContent  = passed ? '✓ ZALICZONE' : '✗ NIEZALICZONE';
            document.getElementById('resultStatus').className    = 'result-status ' + (passed ? 'pass' : 'fail');
            document.getElementById('scoreDisplay').textContent  = score + ' / ' + max;
            document.getElementById('totalScore').textContent    = score;
            document.getElementById('correctCount').textContent  = correct;
            document.getElementById('correctPercent').textContent   = Math.round(correct / QUESTIONS.length * 100) + '%';
            document.getElementById('incorrectPercent').textContent = Math.round(wrong   / QUESTIONS.length * 100) + '%';
            document.getElementById('breakdownCorrect').textContent   = correct + ' × (+2) = +' + (correct * CORRECT_PTS);
            document.getElementById('breakdownIncorrect').textContent = wrong   + ' × (-1) = '  + (wrong * WRONG_PTS);
            document.getElementById('breakdownBlank').textContent     = blank   + ' × (0) = 0';

            document.getElementById('quizScreen').style.display    = 'none';
            document.getElementById('resultsScreen').style.display = 'block';
        }

        function retakeQuiz() {
            idx = 0; ans = {};
            document.getElementById('resultsScreen').style.display = 'none';
            document.getElementById('quizScreen').style.display    = 'block';
            display();
        }

        function exitQuiz() {
            if (confirm('Czy na pewno chcesz wyjść z quizu? Twój postęp zostanie utracony.'))
                window.location.href = '../index.html';
        }

        function goHome() { window.location.href = '../index.html'; }

        window.addEventListener('DOMContentLoaded', display);
    </script>
</body>
</html>
