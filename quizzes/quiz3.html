<!DOCTYPE html>

<body>
    <div class="container">

            <h1>Test 3 - Egzamin Doradcy Inwestycyjnego</h1>
            <p>30 Pytań</p>
        </div>

        <div class="main-content" style="grid-template-columns: 1fr;">
            <!-- Quiz Screen -->
            <div id="quizScreen" class="section">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="question-counter">
                    Pytanie <span id="currentQuestion">1</span> z <span id="totalQuestions">30</span>
                </div>
                <div class="question-text" id="questionText"></div>
                <div class="options" id="optionsContainer"></div>
                <div class="buttons">
                    <button class="btn-secondary" id="prevBtn" onclick="previousQuestion()">← Wstecz</button>
                    <button class="btn-primary" id="nextBtn" onclick="nextQuestion()">Dalej →</button>
                    <button class="btn-primary" id="finishBtn" onclick="finishQuiz()" style="display: none;">Zakończ →</button>
                    <button class="btn-secondary" onclick="exitQuiz()" style="background: #dc3545;">Wyjdź z Quizu</button>
                </div>
            </div>

            <!-- Results Screen -->
            <div id="resultsScreen" class="results-screen section">
                <div class="result-card">
                    <div class="result-status" id="resultStatus"></div>
                    <div class="score-display" id="scoreDisplay">0 / 60</div>
                </div>
                <div class="results-grid">
                    <div class="result-item">
                        <h3>Wynik Całkowity</h3>
                        <div class="value" id="totalScore">0</div>
                    </div>
                    <div class="result-item">
                        <h3>Poprawne</h3>
                        <div class="value" id="correctCount">0</div>
                    </div>
                    <div class="result-item">
                        <h3>Poprawne %</h3>
                        <div class="value" id="correctPercent">0%</div>
                    </div>
                    <div class="result-item">
                        <h3>Niepoprawne %</h3>
                        <div class="value" id="incorrectPercent">0%</div>
                    </div>
                </div>
                <div class="result-breakdown">
                    <div class="breakdown-item">
                        <span class="breakdown-label">✓ Poprawne Odpowiedzi</span>
                        <span class="breakdown-value correct" id="breakdownCorrect">0 × (+2) = 0</span>
                    </div>
                    <div class="breakdown-item">
                        <span class="breakdown-label">✗ Niepoprawne Odpowiedzi</span>
                        <span class="breakdown-value incorrect" id="breakdownIncorrect">0 × (-1) = 0</span>
                    </div>
                    <div class="breakdown-item">
                        <span class="breakdown-label">- Puste Odpowiedzi</span>
                        <span class="breakdown-value" id="breakdownBlank">0 × (0) = 0</span>
                    </div>
                </div>
                <div class="buttons">
                    <button class="btn-primary" onclick="retakeQuiz()">Powtórz Quiz</button>
                    <button class="btn-secondary" onclick="goHome()">Powrót do Domu</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const QUESTIONS = [{"number":61,"text":"Departament zarządzania ryzykiem funduszu inwestycyjnego analizuje na koniec kwartału parametry ryzyka portfela złożonego ze 100 instrumentów o takich samych wariancjach stopy zwrotu oraz takim samym współczynniku korelacji o wartości 0,2 dla dowolnej pary tych instrumentów. Wyznacz jaki procent wariancji każdego z instrumentów będzie stanowić wariancja portfela o jednakowym udziale każdego ze 100 instrumentów. Wskaż najbliższą odpowiedź:","options":{"A":"20%;","B":"21,2%;","C":"20,8%;","D":"19,8%."}},{"number":62,"text":"Analityk norweskiego funduszu emerytalnego dostał zadanie wyceny spółki SIGMA działającej w branży hotelarskiej, której 99% przychodów jest realizowana w Turcji. Spółka jest notowana na tureckiej giełdzie. Na podstawie dostępnych danych o podobnych spółkach prowadzących działalność w Turcji nie był w stanie oszacować kosztu kapitału do wyceny takich spółek. Do wyceny podobnych spółek działających na rynku amerykańskim stosował koszt kapitału w wysokości 9%. Z serwisu informacyjnego pozyskał dane o oczekiwanej inflacji rocznej w US w wysokości 3%, Turcji 42% oraz Norwegii 2,3%. Wyznacz jaki koszt kapitału powinien zastosować do wyceny spółki SIGMA mając do dyspozycji powyższe dane. Wskaż najbliższą odpowiedź:","options":{"A":"50,3%;","B":"51,3%;","C":"9,7%%;","D":"8,3%."}},{"number":63,"text":"Spółka wypłaciła w ostatnim roku dywidendę 10 złotych na akcję i zakładany wzrost do nieskończoności wynosi 5%. Stopa wolna od ryzyka wynosi 4%, beta jest równa 1, a premia za ryzyko rynkowe wynosi 6%. Które z poniższych twierdzeń dotyczące wrażliwości wyceny akcji spółki jest prawdziwe:","options":{"A":"podniesienie stopy wzrostu dywidendy o 1 punkt procentowy ma większy wpływ na wycenę akcji spółki niż wpływ wzrostu premii za ryzyko rynkowe o 1 punkt procentowy;","B":"podniesienie stopy wzrostu dywidendy o 1 punkt procentowy ma mniejszy wpływ na wycenę akcji spółki niż wpływ wzrostu premii za ryzyko rynkowe o 1 punkt procentowy;","C":"podniesienie stopy wzrostu dywidendy o 1 punkt procentowy ma taki sam wpływ na wycenę akcji spółki jak wpływ wzrostu premii za ryzyko rynkowe o 1 punkt procentowy;","D":"zarówno podniesienie stopy dywidendy o 1 punkt procentowy, jak i wzrost premii za ryzyko rynkowe o 1pp nie mają wpływu na wycenę akcji spółki."}},{"number":64,"text":"Dla wyznaczenia stosowanej w ramach analizy technicznej kategorii impetu należy:","options":{"A":"odjąć cenę zamknięcia sprzed x dni od ostatniej ceny zamknięcia;","B":"odjąć ostatnią cenę zamknięcia od ceny zamknięcia sprzed x dni;","C":"pomnożyć ostatnią cenę zamknięcia przez cenę zamknięcia sprzed x dni;","D":"podzielić cenę zamknięcia sprzed x dni przez ostatnią cenę zamknięcia."}},{"number":65,"text":"Cena rocznej europejskiej opcji kupna akcji spółki LUNA o cenie wykonania 60 USD wynosi 5,20 USD. Obecna cena akcji LUNA wynosi 60 USD, zaś w okresie ważności opcji spółka wypłaci dywidendę, której wartość bieżąca szacowana jest na 1,10 USD. Na podstawie powyższych informacji wskaż, której z wymienionych poniżej wartości jest najbliższa wartość rocznej europejskiej opcji sprzedaży akcji spółki LUNA o cenie wykonania 60 USD, jeżeli wolna od ryzyka stopa procentowa wynosi 6% w skali roku (kapitalizacja ciągła), zaś rynek znajduje się w stanie równowagi opisanej przez parytet opcji sprzedaży i kupna (put-call parity).","options":{"A":"1,71 USD;","B":"2,81 USD;","C":"3,91 USD;","D":"4,01 USD."}},{"number":66,"text":"Analityk sporządza wycenę akcji Spółki notowanej na giełdzie specjalizującej się w wydobyciu i przetwarzaniu miedzi. Z analizy czynników rynkowych i finansowych, oszacował, że rentowność dziesięcioletniej obligacji zerokuponowych na rynku wynosi 5%, oszacowany współczynnik beta 1,2 i premia za ryzyko rynkowe 5%. Koszt długu analityk szacuje na 6%, a stopa podatkowa wynosi 20%. Wskaźnik długu (dług/aktywa) na podstawie ostatniego sprawozdania finansowego analityk oszacował na 60%. Uwzględniając czynniki niefinansowe ESG związane z wymaganiami uzyskania licencji i potencjalnymi karami środowiskowymi uznał, że koszt kapitału własnego powinien zostać podwyższony o 75 pb. Oblicz WACC spółki w podejściu integrującym czynniki ESG do wyceny i spośród poniższych odpowiedzi wskaż najbliższą wartość:","options":{"A":"7,9%;","B":"6,2%;","C":"6,8%;","D":"7,6%."}},{"number":67,"text":"Zgodnie z MSSF 10 \"Skonsolidowane sprawozdania finansowe\", zatwierdzonym przez UE, \"grupa kapitałowa\" to:","options":{"A":"jednostka dominująca i jej jednostki zależne;","B":"jednostka dominująca oraz jej jednostki zależne, jednostki stowarzyszone i wspólne przedsięwzięcia;","C":"znaczący inwestor i jego jednostki stowarzyszone;","D":"znaczący inwestor oraz jego jednostki zależne i jednostki stowarzyszone."}},{"number":68,"text":"Mając do dyspozycji poniższe charakterystyki czterech obligacji, wyznacz trzyletnią stopę terminową za rok. Podaj najbliższą wartość.\n\nDługość do terminu wykupu 1 rok: Stopa spot 5%\nDługość do terminu wykupu 2 lata: Stopa spot 5,257%\nDługość do terminu wykupu 3 lata: Stopa spot 5,519%\nDługość do terminu wykupu 4 lata: Stopa spot 5,732%","options":{"A":"5,98%;","B":"5,66%;","C":"5,88%;","D":"5,74%."}},{"number":69,"text":"Obrót zorganizowany, w rozumieniu ustawy o obrocie instrumentami finansowymi, to:","options":{"A":"obrót wyłącznie papierami wartościowymi dokonywany na terytorium Rzeczypospolitej Polskiej na rynku regulowanym albo w ASO;","B":"obrót instrumentami finansowymi innymi niż papiery wartościowe dokonywany na terytorium Rzeczypospolitej Polskiej wyłącznie na rynku regulowanym;","C":"obrót wyłącznie papierami wartościowymi dokonywany na terytorium Unii Europejskiej na rynku regulowanym;","D":"obrót papierami wartościowymi lub innymi instrumentami finansowymi dokonywany na terytorium Rzeczypospolitej Polskiej na rynku regulowanym albo w ASO."}},{"number":70,"text":"Zgodnie z oczekiwaniami inwestorów spółka TATRA za rok od dnia dzisiejszego wypłaci dywidendę na akcję w wysokości 7,00 zł. W przyszłości spodziewany jest stały wzrost dywidendy w tempie 5% rocznie (\"do nieskończoności\"). Roczna stopa zwrotu z aktywów wolnych od ryzyka wynosi 6%, zaś oczekiwana roczna stopa zwrotu z portfela rynkowego 13%. Na podstawie powyższych danych, wiedząc że dzisiejsza cena akcji spółki TATRA wynosi 70,0 zł określ, której z wymienionych poniżej wartości jest najbliższa wartość współczynnika beta tej akcji.","options":{"A":"0,95;","B":"1,18;","C":"1,21;","D":"1,29."}},{"number":71,"text":"Dwuczynnikowa funkcja produkcji ma postać q = KL; gdzie: q - wielkość produkcji; K - nakład kapitału rzeczowego; L - nakład siły roboczej. Która z poniższych wypowiedzi poprawnie charakteryzuje wskazaną funkcję produkcji:","options":{"A":"podana funkcja produkcji cechuje się stałymi efektami skali;","B":"podana funkcja produkcji ma postać funkcji Cobba-Douglasa;","C":"podwojenie nakładów obu czynników produkcji wywoła wzrost q, ale mniejszy niż jej podwojenie;","D":"podana funkcja opisuje proces produkcji w krótkim okresie."}},{"number":72,"text":"Która z wymienionych poniżej europejskich opcji kupna wystawionych na akcje spółek, które nie wypłacają dywidend, jest opcją wystawioną na akcję o najniższej rynkowej cenie. Załóż, że roczna stopa zwrotu z aktywów wolnych od ryzyka wynosi 5%, zaś rynek jest efektywny.\n\nOpcja E: Czas do wygaśnięcia 0,5; Cena wykonania 50; Odch. std stopy zwrotu 20%; Cena opcji 10\nOpcja F: Czas do wygaśnięcia 0,5; Cena wykonania 50; Odch. std stopy zwrotu 25%; Cena opcji 10\nOpcja G: Czas do wygaśnięcia 1,0; Cena wykonania 50; Odch. std stopy zwrotu 20%; Cena opcji 10\nOpcja H: Czas do wygaśnięcia 1,0; Cena wykonania 50; Odch. std stopy zwrotu 25%; Cena opcji 10","options":{"A":"opcja E;","B":"opcja F;","C":"opcja G;","D":"opcja H."}},{"number":73,"text":"Wskaż produkt, który nie jest \"produktem finansowym\" w rozumieniu Rozporządzenia Parlamentu i Rady (UE) 2019/2088 z dnia 27 listopada 2019 r. w sprawie ujawniania informacji związanych ze zrównoważonym rozwojem w sektorze usług finansowych (zwanym też: SFDR):","options":{"A":"produkt emerytalny;","B":"program emerytalny;","C":"UCITS;","D":"kredyt hipoteczny."}},{"number":74,"text":"Wskaż gdzie, zgodnie z Rozporządzeniem Parlamentu i Rady (UE) 2019/2088 z dnia 27 listopada 2019 r. w sprawie ujawniania informacji związanych ze zrównoważonym rozwojem w sektorze usług finansowych (zwanym też: SFDR), uczestnicy rynku finansowego powinni publikować informacje na temat swoich strategii dotyczących wprowadzania do działalności ryzyk dla zrównoważonego rozwoju w procesie podejmowania decyzji inwestycyjnych.","options":{"A":"na swoich stronach internetowych;","B":"w sprawozdaniu finansowym;","C":"w raporcie dla zarządu;","D":"w raporcie dla rady nadzorczej."}},{"number":75,"text":"Na rynku są notowane dwie skarbowe obligacje zerokuponowe. Pierwsza obligacja o terminie wykupu trzech lat, druga ma okres zapadalności o jeden rok krótszy. Rentowność do wykupu pierwszej obligacji (YTM yield to maturity) wynosi 5,5%, a obligacji dwuletniej 5%. Obsługujące klienta biuro maklerskie umożliwia mu kupno cząstkowych obligacji dzięki czemu może zainwestować taką samą kwotę kapitału zarówno w obligacje zerokuponowe dwuletnie, jak i trzyletnie. Wyznacz i wskaż przy jakiej rocznej stopie procentowej za dwa lata inwestor uzyskałby większy kapitał na koniec trzeciego roku z reinwestowania środków z wykupu obligacji dwuletnich niż z inwestycji w obligacje trzyletnie.","options":{"A":"wyższej niż 6,5%;","B":"równej 6%;","C":"niższej niż 6,4%;","D":"wyższej niż 5,5%, ale niższej niż 6%."}},{"number":76,"text":"Rozważasz zainwestowanie łącznie 10 000 zł w aktywa wolne od ryzyka o rocznej stopie zwrotu 5% oraz portfel P. Portfel P składa się w 60% z akcji spółki Zeta i w 40% z akcji spółki Greta. Oczekiwana roczna stopa zwrotu z akcji spółki Zeta wynosi 14%, zaś odchylenie standardowe jej stopy zwrotu 10%. Oczekiwana roczna stopa zwrotu z akcji spółki Greta wynosi 10%, zaś odchylenie standardowe jej stopy zwrotu 9%. Chciałbyś zainwestować posiadane środki w aktywa wolne od ryzyka oraz w portfel P w taki sposób, aby oczekiwana roczna stopa zwrotu z takiej inwestycji wyniosła 10%. Na podstawie powyższych informacji określ, której z poniższych wartości jest najbliższy udział akcji spółki Greta w takiej inwestycji (w portfelu złożonym z aktywów wolnych od ryzyka oraz portfela P).","options":{"A":"25%;","B":"27%;","C":"31%;","D":"33%."}},{"number":77,"text":"Na podstawie ustawy o funduszach inwestycyjnych i zarządzaniu alternatywnymi funduszami inwestycyjnymi wskaż definicję alternatywnego funduszu inwestycyjnego:","options":{"A":"jest to instytucja wspólnego inwestowania, której przedmiotem działalności, w tym w ramach wydzielonego subfunduszu, jest zbieranie aktywów od wielu inwestorów w celu ich lokowania w interesie tych inwestorów zgodnie z określoną polityką inwestycyjną, niebędąca funduszem działającym zgodnie z prawem wspólnotowym regulującym zasady zbiorowego inwestowania w papiery wartościowe;","B":"jest to instytucja wspólnego inwestowania, której przedmiotem działalności, jest zbieranie aktywów od wielu inwestorów w celu ich lokowania zgodnie z określoną polityką inwestycyjną, będąca funduszem działającym zgodnie z prawem wspólnotowym regulującym zasady zbiorowego inwestowania w papiery wartościowe;","C":"jest to instytucja wspólnego inwestowania, której przedmiotem działalności, w tym w ramach wydzielonego subfunduszu, jest zbieranie aktywów od 150 inwestorów w celu ich lokowania w interesie tych inwestorów, będąca funduszem działającym zgodnie z prawem wspólnotowym regulującym zasady zbiorowego inwestowania w papiery wartościowe;","D":"jest to instytucja wspólnego inwestowania, której przedmiotem działalności, w tym w ramach wydzielonego subfunduszu, jest zbieranie aktywów od 150 inwestorów w celu ich lokowania w interesie tych inwestorów zgodnie z określoną polityką inwestycyjną, będąca funduszem."}},{"number":78,"text":"Bank udzielił kredytu w wysokości 500 000 zł, który jest spłacany w 100 równych kwartalnych ratach. Oprocentowanie kredytu wynosi 6% w skali roku. Na podstawie powyższych danych oblicz różnicę pomiędzy 56 a 55 ratą kapitałową tego kredytu. Podaj najbliższą wartość.","options":{"A":"73,24;","B":"123,73;","C":"83,12;","D":"62,45."}},{"number":79,"text":"Średni ważony koszt kapitału spółki zadłużonej jest równy 13%. Dług tej spółki stanowi 60% wartości spółki. Korzystając z modelu Millera-Modiglianiego oblicz szacunkowy koszt kapitału własnego tej spółki, gdyby w całości finansowana była kapitałem własnym. Przyjmij, że stopa podatku od dochodów spółki wynosi 20%. Podaj najbliższą wartość.","options":{"A":"15,2%;","B":"13,9%;","C":"14,3%;","D":"14,8%."}},{"number":80,"text":"Czy, zgodnie z przepisami ustawy o ofercie publicznej i warunkach wprowadzania instrumentów finansowych do zorganizowanego systemu obrotu oraz o spółkach publicznych, dostawca usług finansowania społecznościowego ma obowiązek przekazania Komisji Nadzoru Finansowego arkusz kluczowych informacji inwestycyjnych?","options":{"A":"nie;","B":"tak, w terminie na co najmniej 7 dni roboczych przed dniem udostępnienia arkusza kluczowych informacji inwestycyjnych do publicznej wiadomości;","C":"tak, w terminie na co najmniej 5 dni roboczych przed dniem udostępnienia arkusza kluczowych informacji inwestycyjnych do publicznej wiadomości;","D":"tak, w terminie na co najmniej 10 dni roboczych przed dniem udostępnienia arkusza kluczowych informacji inwestycyjnych do publicznej wiadomości."}},{"number":81,"text":"Wskaż błędną wypowiedź dotyczącą rozpiętości opcyjnej (option-adjusted spread) obligacji z opcjami dodatkowymi:","options":{"A":"jest to różnica pomiędzy ceną rynkową a wartością analizowanego instrumentu dłużnego;","B":"najczęściej jest obliczana w odniesieniu do natychmiastowej stopy procentowej;","C":"jest niezależna od zakładanego poziomu zmienności stóp procentowych;","D":"jej wartość powiększona o wartość opcji (w punktach bazowych) równa jest rozpiętości statycznej."}},{"number":82,"text":"Zgodnie z MSR 8 \"Zasady (polityka) rachunkowości, zmiany wartości szacunkowych i korygowanie błędów\", zatwierdzonym przez UE, prawdą jest, że:","options":{"A":"zmiana wartości szacunkowej, w wyniku pojawienia się nowych informacji lub nowych zdarzeń bądź zdobycia większego doświadczenia, stanowi korektę błędu;","B":"przykładowymi wartościami szacunkowymi są: odpis na oczekiwane straty kredytowe w zastosowaniu MSSF 9 \"Instrumenty finansowe\" i możliwa do uzyskania wartość netto składnika zapasów w zastosowaniu MSR 2 \"Zapasy\";","C":"koszt amortyzacji pozycji rzeczowych aktywów trwałych w zastosowaniu MSR 16 \"Rzeczowe aktywa trwałe\" nie stanowi przykładu wartości szacunkowej;","D":"w przypadku trudności w odróżnieniu zmiany zasad (polityki) rachunkowości od zmiany wartości szacunkowej, zmianę traktuje się jako zmianę zasad (polityki) rachunkowości."}},{"number":83,"text":"Analityk biura inwestycyjnego bada wrażliwość zmiany ceny obligacji w scenariuszach wzrostu i spadku stóp procentowych. Analizuje obligację czteroletną, o stałym oprocentowaniu, kuponie wypłacanym raz w roku i wartości nominalnej 1 000 złotych. Obligacja jest bez opcji wcześniejszego wykupu (call option). Z serwisu informacyjnego wie, że przy bieżącej cenie obligacji równej 1 020 złotych rentowność do wykupu (YTM) wynosi 5%. Wskaż, które z poniższych stwierdzeń dotyczących zmiany ceny obligacji przy zmianie rentowności do wykupu o 100 pb w górę lub w dół jest prawdziwe:","options":{"A":"cena obligacji w przypadku wzrostu rentowności do wykupu spadnie mniej niż wzrost ceny w przypadku spadku rentowności do wykupu;","B":"cena obligacji w przypadku wzrostu rentowności do wykupu spadnie dokładnie tyle samo co wzrost ceny w przypadku spadku rentowności do wykupu;","C":"cena obligacji w przypadku wzrostu rentowności do wykupu spadnie więcej niż wzrost ceny w przypadku spadku rentowności do wyku         const ANSWER_KEY = {"1":"B","2":"B","3":"B","4":"B","5":"B","6":"B","7":"B","8":"B","9":"B","10":"B","11":"B","12":"B","13":"B","14":"B","15":"B","16":"B","17":"B","18":"B","19":"B","20":"B","21":"B","22":"B","23":"B","24":"B","25":"B","26":"B","27":"B","28":"B","29":"B","30":"B","31":"B","32":"B","33":"B","34":"B","35":"B","36":"B","37":"B","38":"B","39":"B","40":"B","41":"B","42":"B","43":"B","44":"B","45":"B","46":"B","47":"B","48":"B","49":"B","50":"B","51":"B","52":"B","53":"B","54":"B","55":"B","56":"B","57":"B","58":"B","59":"B","60":"B","61":"B","62":"B","63":"B","64":"B","65":"B","66":"B","67":"B","68":"B","69":"B","70":"B","71":"B","72":"B","73":"B","74":"B","75":"B","76":"B","77":"B","78":"B","79":"B","80":"B","81":"B","82":"B","83":"B","84":"B","85":"B","86":"B","87":"B","88":"B","89":"B","90":"B","91":"B","92":"B","93":"B","94":"B","95":"B","96":"B","97":"B","98":"B","99":"B","100":"B","101":"B","102":"B","103":"B","104":"B","105":"B","106":"B","107":"B","108":"B","109":"B","110":"B"};

        let currentQuestions = QUESTIONS;
        let currentQuestionIndex = 0;
        let answers = {};

        const PASS_SCORE = 40;
        const CORRECT_POINTS = 2;
        const INCORRECT_POINTS = -1;

        function displayQuestion() {
            const q = currentQuestions[currentQuestionIndex];
            const isAnswered = answers[currentQuestionIndex] !== undefined;

            document.getElementById('currentQuestion').textContent = currentQuestionIndex + 1;
            const progress = ((currentQuestionIndex + 1) / currentQuestions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';

            document.getElementById('questionText').textContent = q.text;

            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';

            const answerKey = JSON.parse(localStorage.getItem('answerKey')) || ANSWER_KEY;

            Object.entries(q.options).forEach(([key, value]) => {
                const div = document.createElement('div');
                div.className = 'option';

                const isSelected = answers[currentQuestionIndex] === key;
                const correctAnswer = answerKey[q.number];

                if (isAnswered && isSelected) {
                    div.classList.add('answered');
                    if (key === correctAnswer) {
                        div.classList.add('correct');
                    } else {
                        div.classList.add('incorrect');
                    }
                }

                const feedback = isAnswered && isSelected && correctAnswer
                    ? `<span class="feedback">${key === correctAnswer ? '✓ Poprawnie' : '✗ Źle'}</span>`
                    : '';

                div.innerHTML = `
                    <input type="radio" id="opt_${key}" name="answer" value="${key}"
                           ${isSelected ? 'checked' : ''} ${isAnswered ? 'disabled' : ''}
                           onchange="selectAnswer('${key}')">
                    <label for="opt_${key}">${key}: ${value}</label>
                    ${feedback}
                `;
                container.appendChild(div);
            });

            document.getElementById('prevBtn').disabled = currentQuestionIndex === 0;
            const isLast = currentQuestionIndex === currentQuestions.length - 1;
            document.getElementById('nextBtn').style.display = isLast ? 'none' : 'block';
            document.getElementById('finishBtn').style.display = isLast ? 'block' : 'none';
        }

        function selectAnswer(key) {
            answers[currentQuestionIndex] = key;
            displayQuestion();
        }

        function nextQuestion() {
            if (currentQuestionIndex < currentQuestions.length - 1) {
                currentQuestionIndex++;
                displayQuestion();
            }
        }

        function previousQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                displayQuestion();
            }
        }

        function finishQuiz() {
            const answerKey = JSON.parse(localStorage.getItem('answerKey')) || ANSWER_KEY;
            let correct = 0, incorrect = 0, blank = 0;

            currentQuestions.forEach((q, idx) => {
                const userAnswer = answers[idx];
                const correctAnswer = answerKey[q.number];

                if (!userAnswer) {
                    blank++;
                } else if (userAnswer === correctAnswer) {
                    correct++;
                } else {
                    incorrect++;
                }
            });

            const score = (correct * CORRECT_POINTS) + (incorrect * INCORRECT_POINTS);
            const maxScore = currentQuestions.length * CORRECT_POINTS;
            const passed = score >= PASS_SCORE;

            document.getElementById('resultStatus').textContent = passed ? '✓ ZALICZONE' : '✗ NIEZALICZONE';
            document.getElementById('resultStatus').className = 'result-status ' + (passed ? 'pass' : 'fail');
            document.getElementById('scoreDisplay').textContent = `${score} / ${maxScore}`;
            document.getElementById('totalScore').textContent = score;
            document.getElementById('correctCount').textContent = correct;
            document.getElementById('correctPercent').textContent = Math.round((correct / currentQuestions.length) * 100) + '%';
            document.getElementById('incorrectPercent').textContent = Math.round((incorrect / currentQuestions.length) * 100) + '%';

            document.getElementById('breakdownCorrect').textContent = `${correct} × (+2) = +${correct * CORRECT_POINTS}`;
            document.getElementById('breakdownIncorrect').textContent = `${incorrect} × (-1) = ${incorrect * INCORRECT_POINTS}`;
            document.getElementById('breakdownBlank').textContent = `${blank} × (0) = 0`;

            document.getElementById('quizScreen').style.display = 'none';
            document.getElementById('resultsScreen').style.display = 'block';
        }

        function retakeQuiz() {
            currentQuestionIndex = 0;
            answers = {};
            document.getElementById('resultsScreen').style.display = 'none';
            document.getElementById('quizScreen').style.display = 'block';
            displayQuestion();
        }

        function exitQuiz() {
            if (confirm('Czy na pewno chcesz wyjść z quizu? Twój postęp zostanie utracony.')) {
                window.location.href = '../index.html';
            }
        }

        function goHome() {
            window.location.href = '../index.html';
        }

        // Initialize
        window.addEventListener('DOMContentLoaded', displayQuestion);
    </script>
