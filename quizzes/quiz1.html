    <script>
        const QUESTIONS   = [{"number":1,"text":"Na podstawie MSR 2 \"Zapasy\", zatwierdzonego przez UE, wskaż stwierdzenie fałszywe:","options":{"A":"zapasy wycenia się w cenie nabycia lub koszcie wytworzenia lub też według wartości netto możliwej do uzyskania, w zależności od tego, która z kwot jest wyższa;","B":"wartość netto możliwa do uzyskania jest to szacunkowa cena sprzedaży w toku zwykłej działalności gospodarczej pomniejszona o szacowane koszty przygotowania sprzedaży i szacunkowe koszty niezbędne do doprowadzenia sprzedaży do skutku;","C":"przykładami kosztów wyłączonych z ceny nabycia lub kosztu wytworzenia zapasów i ujmowanych jako koszty okresu, w którym je poniesiono, są ogólne koszty administracyjne, które nie przyczyniają się do doprowadzenia zapasów do ich aktualnego stanu i miejsca;","D":"przykładami kosztów wyłączonych z ceny nabycia lub kosztu wytworzenia zapasów i ujmowanych jako koszty okresu, w którym je poniesiono, są nietypowe wielkości (zużycie ponadnormatywne) zmarnowanych materiałów, robocizny oraz innych kosztów produkcyjnych."}},{"number":2,"text":"Zgodnie z przepisami ustawy Prawo przedsiębiorców kontrolę u przedsiębiorcy wszczyna się nie wcześniej niż po upływie 7 dni i nie później niż przed upływem 30 dni od dnia doręczenia zawiadomienia o zamiarze wszczęcia kontroli. Co dzieje się w sytuacji kiedy kontrola nie zostanie wszczęta w terminie 30 dni od dnia doręczenia zawiadomienia?","options":{"A":"w takiej sytuacji wszczęcie kontroli wymaga ponownego zawiadomienia;","B":"w takiej sytuacji kontrola nie może już być wszczęta w tym samym przedmiocie sprawy;","C":"w takiej sytuacji wszczęcie kontroli następuje po upływie kolejnych 7 dni;","D":"w takiej sytuacji wszczęcie kontroli powinno nastąpić przed upływem kolejnych 30 dni od daty doręczenia zawiadomienia o zamiarze wszczęcia kontroli."}},{"number":3,"text":"Czy, zgodnie z przepisami ustawy o ofercie publicznej i warunkach wprowadzania instrumentów finansowych do zorganizowanego systemu obrotu oraz o spółkach publicznych, dostawca usług finansowania społecznościowego ma obowiązek przekazania Komisji Nadzoru Finansowego arkusz kluczowych informacji inwestycyjnych?","options":{"A":"nie;","B":"tak, w terminie na co najmniej 7 dni roboczych przed dniem udostępnienia arkusza kluczowych informacji inwestycyjnych do publicznej wiadomości;","C":"tak, w terminie na co najmniej 5 dni roboczych przed dniem udostępnienia arkusza kluczowych informacji inwestycyjnych do publicznej wiadomości;","D":"tak, w terminie na co najmniej 10 dni roboczych przed dniem udostępnienia arkusza kluczowych informacji inwestycyjnych do publicznej wiadomości."}},{"number":4,"text":"Wskaż zdanie prawdziwe:","options":{"A":"upoważnieni pracownicy Urzędu Komisji Nadzoru Finansowego mogą przeprowadzić w domu maklerskim wizytę nadzorczą w zakresie niezbędnym do nadzoru ostrożnościowego nad domami maklerskimi;","B":"upoważnieni pracownicy Urzędu Komisji Nadzoru Finansowego nie mogą przeprowadzić w domu maklerskim wizyty nadzorczej;","C":"upoważnieni pracownicy Urzędu Komisji Nadzoru Finansowego mogą przeprowadzić w domu maklerskim wizytę nadzorczą wyłącznie w zakresie ustalenia, jakimi regulaminami obsługi klienta dysponuje dom maklerski;","D":"upoważnieni pracownicy Urzędu Komisji Nadzoru Finansowego mogą przeprowadzić w domu maklerskim wizytę nadzorczą, która może trwać nie dłużej niż 30 dni."}},{"number":5,"text":"Na podstawie przepisów ustawy o funduszach inwestycyjnych i zarządzaniu alternatywnymi funduszami inwestycyjnymi wskaż, co należy do zadań depozytariusza:","options":{"A":"wykonywanie obowiązków określonych w ustawie, w szczególności polegających na przechowywaniu aktywów oraz prowadzeniu rejestru aktywów funduszu inwestycyjnego lub alternatywnej spółki inwestycyjnej, a także na zapewnieniu właściwego monitorowania przepływu środków pieniężnych tych podmiotów;","B":"wykonywanie obowiązków polegających wyłącznie na przechowywaniu aktywów oraz prowadzeniu rejestru aktywów alternatywnej spółki inwestycyjnej;","C":"wykonywanie obowiązków polegających wyłącznie na przechowywaniu aktywów funduszu inwestycyjnego;","D":"wykonywanie obowiązków polegających wyłącznie na zapewnieniu właściwego monitorowania przepływu środków pieniężnych funduszu inwestycyjnego."}},{"number":6,"text":"Czy powołany przez bank komitet do spraw nominacji ma obowiązek przyjąć politykę różnorodności w składzie zarządu banku?","options":{"A":"tak;","B":"nie, ponieważ to zadanie zawsze należy do rady nadzorczej banku;","C":"nie, ponieważ to zadanie zawsze należy do zarządu banku;","D":"nie, ponieważ przyjęta polityka różnorodności ma się odnosić wyłącznie do osób zasiadających na stanowiskach kierowniczych w banku."}},{"number":7,"text":"Czy, zgodnie z przepisami ustawy o obrocie instrumentami finansowymi, posiadanie akcji spółki akcyjnej prowadzącej rynek regulowany przez podmioty pozostające w tej samej grupie kapitałowej uważa się za ich posiadanie przez jeden podmiot?","options":{"A":"tak;","B":"nie;","C":"nie, chyba że podmioty pozostające w tej samej grupie kapitałowej przekazały odpowiednie zawiadomienie Przewodniczącemu Komisji Nadzoru Finansowego;","D":"nie, chyba że podmioty pozostające w tej samej grupie kapitałowej przekazały odpowiednie zawiadomienie Komisji Nadzoru Finansowego."}},{"number":8,"text":"Organami Urzędu Komisji Nadzoru Finansowego są:","options":{"A":"Komisja Nadzoru Finansowego i Przewodniczący Komisji Nadzoru Finansowego;","B":"wyłącznie Komisja Nadzoru Finansowego;","C":"wyłącznie Przewodniczący Komisji Nadzoru Finansowego;","D":"Urząd Komisji Nadzoru Finansowego nie posiada swoich organów."}},{"number":9,"text":"Zgodnie z ustawą o nadzorze nad rynkiem kapitałowym Komisja Nadzoru Finansowego, w przypadku wydania decyzji nakładającej karę za naruszenie przepisów rozporządzenia w sprawie nadużyć na rynku nr 596/2014 (zwanym też: MAR), może, w drodze uchwały, zdecydować o przekazaniu do publicznej wiadomości informacji o wydaniu tej decyzji. Czy Komisja Nadzoru Finansowego udostępnia na swojej stronie internetowej informacje dotyczące imienia i nazwiska osoby, której dotyczy taka decyzja?","options":{"A":"nie, ponieważ w przypadku wydania takiej decyzji Komisja Nadzoru Finansowego nie posiada uprawnień do udostępniania informacji dotyczących osoby fizycznej;","B":"tak, a informacje dotyczące imienia i nazwiska osoby, której dotyczy decyzja, Komisja Nadzoru Finansowego udostępnia na swojej stronie internetowej przez okres 5 lat licząc od dnia ich udostępnienia;","C":"tak, a informacje dotyczące imienia i nazwiska osoby, której dotyczy decyzja, Komisja Nadzoru Finansowego udostępnia na swojej stronie internetowej przez okres roku licząc od dnia ich udostępnienia;","D":"tak, a informacje dotyczące imienia i nazwiska osoby, której dotyczy decyzja, Komisja Nadzoru Finansowego udostępnia na swojej stronie internetowej przez okres roku licząc od dnia podjęcia przez Komisję tej decyzji."}},{"number":10,"text":"Dokończ zdanie, aby było ono prawdziwe zgodnie z przepisami Kodeksu cywilnego: Każdy człowiek ma zdolność prawną","options":{"A":"od chwili urodzenia;","B":"od ukończenia lat osiemnastu;","C":"którą uzyskuje poprzez zawarcie małżeństwa;","D":"którą uzyskuje poprzez zawarcie małżeństwa, o ile małżeństwo to nie zostanie unieważnione."}},{"number":11,"text":"Zgodnie z MSR 8 \"Zasady (polityka) rachunkowości, zmiany wartości szacunkowych i korygowanie błędów\", zatwierdzonym przez UE, prawdą jest, że:","options":{"A":"zmiana wartości szacunkowej, w wyniku pojawienia się nowych informacji lub nowych zdarzeń bądź zdobycia większego doświadczenia, stanowi korektę błędu;","B":"przykładowymi wartościami szacunkowymi są: odpis na oczekiwane straty kredytowe w zastosowaniu MSSF 9 \"Instrumenty finansowe\" i możliwa do uzyskania wartość netto składnika zapasów w zastosowaniu MSR 2 \"Zapasy\";","C":"koszt amortyzacji pozycji rzeczowych aktywów trwałych w zastosowaniu MSR 16 \"Rzeczowe aktywa trwałe\" nie stanowi przykładu wartości szacunkowej;","D":"w przypadku trudności w odróżnieniu zmiany zasad (polityki) rachunkowości od zmiany wartości szacunkowej, zmianę traktuje się jako zmianę zasad (polityki) rachunkowości."}},{"number":12,"text":"Na podstawie ustawy o funduszach inwestycyjnych i zarządzaniu alternatywnymi funduszami inwestycyjnymi wskaż definicję alternatywnego funduszu inwestycyjnego:","options":{"A":"jest to instytucja wspólnego inwestowania, której przedmiotem działalności, w tym w ramach wydzielonego subfunduszu, jest zbieranie aktywów od wielu inwestorów w celu ich lokowania w interesie tych inwestorów zgodnie z określoną polityką inwestycyjną, niebędąca funduszem działającym zgodnie z prawem wspólnotowym regulującym zasady zbiorowego inwestowania w papiery wartościowe;","B":"jest to instytucja wspólnego inwestowania, której przedmiotem działalności, jest zbieranie aktywów od wielu inwestorów w celu ich lokowania zgodnie z określoną polityką inwestycyjną, będąca funduszem działającym zgodnie z prawem wspólnotowym regulującym zasady zbiorowego inwestowania w papiery wartościowe;","C":"jest to instytucja wspólnego inwestowania, której przedmiotem działalności, w tym w ramach wydzielonego subfunduszu, jest zbieranie aktywów od 150 inwestorów w celu ich lokowania w interesie tych inwestorów, będąca funduszem działającym zgodnie z prawem wspólnotowym regulującym zasady zbiorowego inwestowania w papiery wartościowe;","D":"jest to instytucja wspólnego inwestowania, której przedmiotem działalności, w tym w ramach wydzielonego subfunduszu, jest zbieranie aktywów od 150 inwestorów w celu ich lokowania w interesie tych inwestorów zgodnie z określoną polityką inwestycyjną, będąca funduszem."}},{"number":13,"text":"Wskaż, który organ banku wprowadza oraz zapewnia działanie systemu zarządzania.","options":{"A":"zarząd;","B":"żaden organ nie jest wskazany w odniesieniu do tego zadania w ustawie Prawo bankowe;","C":"rada nadzorcza;","D":"za to zadanie odpowiada wyłącznie prezes zarządu banku."}},{"number":14,"text":"Czy, w rozumieniu ustawy Prawo bankowe, w banku istotnym mają obowiązek działać komitet do spraw wynagrodzeń oraz komitet do spraw ryzyka?","options":{"A":"tak;","B":"taki wymóg dotyczy każdego banku, a nie tylko banku istotnego;","C":"bank istotny ma obowiązek ustanowić jedynie komitet do spraw wynagrodzeń;","D":"bank istotny ma obowiązek ustanowić jedynie komitet do spraw ryzyka."}},{"number":15,"text":"Czy, zgodnie z ustawą o obrocie instrumentami finansowymi, spółka prowadząca rynek regulowany może organizować rynki wyodrębnione?","options":{"A":"tak, przy czym wyodrębniony rynek powinien odnosić się jedynie do rodzaju papierów wartościowych;","B":"tak, przy czym wyodrębniony rynek powinien odnosić się do rodzaju papierów wartościowych lub innych instrumentów finansowych, jak również rodzaju ich emitentów;","C":"tak, przy czym wyodrębniony rynek powinien odnosić się jedynie do rodzaju emitentów papierów wartościowych;","D":"tak, przy czym wyodrębniony rynek powinien odnosić się jedynie do rodzaju papierów wartościowych oraz rodzaju ich emitentów."}},{"number":16,"text":"W przypadku rozliczania łączenia się spółek handlowych metodą łączenia udziałów, zgodnie z ustawą o rachunkowości, koszty poniesione w związku z połączeniem, w tym również koszty organizacji poniesione przy założeniu nowej spółki lub koszty podwyższenia kapitału spółki, na którą przechodzi majątek łączących się spółek, zalicza się do:","options":{"A":"strat nadzwyczajnych;","B":"kosztów finansowych;","C":"pozostałych kosztów operacyjnych;","D":"kosztów ogólnego zarządu."}},{"number":17,"text":"Wskaż zdanie prawdziwe. Obrotem wtórnym, w rozumieniu ustawy o obrocie instrumentami finansowymi, jest m.in. proponowanie:","options":{"A":"w dowolny sposób, przez podmiot inny niż wystawca, nabycia każdego rodzaju instrumentów finansowych lub nabywanie ich od tego innego podmiotu, jeżeli propozycja skierowana jest do co najmniej 200 osób, a przepis nie odnosi się w żaden sposób do formy proponowania;","B":"w dowolnej formie i w dowolny sposób, przez podmiot inny niż wystawca, nabycia instrumentów finansowych będących papierami wartościowymi lub nabywanie ich od tego innego podmiotu, jeżeli propozycja skierowana jest do co najmniej 200 osób lub do nieoznaczonego adresata;","C":"w dowolnej formie i w dowolny sposób, przez podmiot inny niż wystawca, nabycia instrumentów finansowych niebędących papierami wartościowymi lub nabywanie ich od tego innego podmiotu, jeżeli propozycja skierowana jest do co najmniej 150 osób lub do nieoznaczonego adresata;","D":"w formie elektronicznej, przez podmiot inny niż wystawca, nabycia instrumentów finansowych będących papierami wartościowymi lub nabywanie ich od tego innego podmiotu, jeżeli propozycja skierowana jest do co najmniej 150 osób lub do nieoznaczonego adresata."}},{"number":18,"text":"Zgodnie z MSSF 3 \"Połączenia jednostek\", zatwierdzonym przez UE, prawdą jest, że:","options":{"A":"zastosowanie metody przejęcia do rozliczenia połączenia jednostek wymaga zidentyfikowania jednostki przejmującej;","B":"stosując metodę przejęcia do rozliczenia połączenia jednostek, jednostka przejmująca ustala dzień przejęcia, którym jest dzień rozpoczęcia wywierania znaczącego wpływu na jednostkę przejmowaną;","C":"okres wyceny, następujący po dniu przejęcia, w którym jednostka przejmująca może skorygować kwoty tymczasowe ujęte w związku z połączeniem jednostek, nie powinien przekraczać dwóch lat od dnia przejęcia;","D":"do rozliczenia połączenia jednostek, jednostka przejmująca może stosować metodę praw własności."}},{"number":19,"text":"Zgodnie z ustawą o rachunkowości, przez \"aktywa netto\" rozumie się:","options":{"A":"aktywa jednostki pomniejszone o aktywa obrotowe;","B":"aktywa obrotowe jednostki pomniejszone o zapasy;","C":"aktywa obrotowe jednostki pomniejszone o zobowiązania krótkoterminowe;","D":"aktywa jednostki pomniejszone o zobowiązania, odpowiadające wartościowo kapitałowi (funduszowi) własnemu."}},{"number":20,"text":"Zgodnie z ustawą o rachunkowości, skonsolidowane sprawozdania finansowe banków:","options":{"A":"sporządza się zgodnie z MSR;","B":"mogą być sporządzane zgodnie z MSR, jeżeli organ zatwierdzający banku tak postanowi;","C":"mogą być sporządzane zgodnie z MSR, jeżeli organ nadzorujący banku tak postanowi;","D":"mogą być sporządzane zgodnie z MSR, jeżeli organ zarządzający banku tak postanowi."}},{"number":21,"text":"Obrót zorganizowany, w rozumieniu ustawy o obrocie instrumentami finansowymi, to:","options":{"A":"obrót wyłącznie papierami wartościowymi dokonywany na terytorium Rzeczypospolitej Polskiej na rynku regulowanym albo w ASO;","B":"obrót instrumentami finansowymi innymi niż papiery wartościowe dokonywany na terytorium Rzeczypospolitej Polskiej wyłącznie na rynku regulowanym;","C":"obrót wyłącznie papierami wartościowymi dokonywany na terytorium Unii Europejskiej na rynku regulowanym;","D":"obrót papierami wartościowymi lub innymi instrumentami finansowymi dokonywany na terytorium Rzeczypospolitej Polskiej na rynku regulowanym albo w ASO."}},{"number":22,"text":"Wskaż kategorię podmiotu, który nie jest wymieniony w Rozporządzeniu Parlamentu i Rady (UE) 2019/2088 z dnia 27 listopada 2019 r. w sprawie ujawniania informacji związanych ze zrównoważonym rozwojem w sektorze usług finansowych (zwanym też: SFDR) jako \"uczestnik rynku finansowego\":","options":{"A":"zakład ubezpieczeń, który udostępnia ubezpieczeniowy produkt inwestycyjny;","B":"firma inwestycyjna, która świadczy usługi zarządzania portfelem;","C":"instytucja pracowniczych programów emerytalnych (IORP);","D":"bank, który nie świadczy usługi zarządzania portfelem."}},{"number":23,"text":"Czy bank może udzielać kredytu na kupno bankowych papierów wartościowych emitowanych przez siebie?","options":{"A":"nie;","B":"nie, ale może udzielić pożyczki pieniężnej na taki cel;","C":"tak;","D":"tak, ale nie dotyczy to udzielania kredytów dla członków organów statutowych banku."}},{"number":24,"text":"Wskaż gdzie, zgodnie z Rozporządzeniem Parlamentu i Rady (UE) 2019/2088 z dnia 27 listopada 2019 r. w sprawie ujawniania informacji związanych ze zrównoważonym rozwojem w sektorze usług finansowych (zwanym też: SFDR), uczestnicy rynku finansowego powinni publikować informacje na temat swoich strategii dotyczących wprowadzania do działalności ryzyk dla zrównoważonego rozwoju w procesie podejmowania decyzji inwestycyjnych.","options":{"A":"na swoich stronach internetowych;","B":"w sprawozdaniu finansowym;","C":"w raporcie dla zarządu;","D":"w raporcie dla rady nadzorczej."}},{"number":25,"text":"Wykonanie zobowiązań. Czy wierzyciel może odmówić przyjęcia świadczenia częściowego?","options":{"A":"wierzyciel może odmówić przyjęcia świadczenia częściowego, nawet jeżeli cała wierzytelność jest już wymagalna;","B":"wierzyciel nie może odmówić przyjęcia świadczenia częściowego, chociażby cała wierzytelność była już wymagalna, chyba że przyjęcie takiego świadczenia narusza jego uzasadniony interes;","C":"wierzyciel zobowiązany jest odmówić przyjęcia świadczenia częściowego, kiedy przyjęcie takiego świadczenia narusza jego interes finansowy;","D":"wierzyciel nie może odmówić przyjęcia świadczenia częściowego, nawet jeżeli przyjęcie takiego świadczenia narusza jego uzasadniony interes."}},{"number":26,"text":"Wskaż zdanie prawdziwe:","options":{"A":"Komisja Nadzoru Finansowego przekazuje do publicznej wiadomości istotne informacje, które mogą mieć wpływ na ocenę papierów wartościowych będących przedmiotem oferty publicznej lub ubiegania się o dopuszczenie do obrotu na rynku regulowanym, aby zapewnić inwestorom ochronę lub zapewnić prawidłowe działanie rynku;","B":"Komisja Nadzoru Finansowego nie posiada uprawnień do przekazywania do publicznej wiadomości informacji, które mogłyby mieć wpływ na ocenę papierów wartościowych będących przedmiotem oferty publicznej lub ubiegania się o dopuszczenie do obrotu na rynku regulowanym;","C":"Komisja Nadzoru Finansowego przekazuje do publicznej wiadomości każdą informację, która może mieć wpływ na ocenę papierów wartościowych nie będących przedmiotem oferty publicznej, aby zapewnić inwestorom równy dostęp do informacji;","D":"Komisja Nadzoru Finansowego przekazuje do publicznej wiadomości informacje, które mają wpływ na ocenę każdego instrumentu finansowego, o ile oceni, że takie działanie zapewni inwestorom równy dostęp do informacji."}},{"number":27,"text":"Wskaż definicję listu zastawnego:","options":{"A":"list zastawny jest dłużnym papierem wartościowym wyemitowanym przez bank hipoteczny, który jest zabezpieczony aktywami stanowiącymi zabezpieczenie listów zastawnych, względem których posiadaczom listów zastawnych przysługuje bezpośrednio roszczenie zarówno do osobnej masy upadłości wyodrębnionej zgodnie z przepisami ustawy Prawo upadłościowe, jak i do banku hipotecznego;","B":"list zastawny jest instrumentem finansowym wyemitowanym przez bank niebędący spółką akcyjną, który jest zabezpieczony aktywami stanowiącymi zabezpieczenie listów zastawnych, względem których posiadaczom listów zastawnych przysługuje bezpośrednio roszczenie zarówno do osobnej masy upadłości wyodrębnionej zgodnie z przepisami ustawy Prawo upadłościowe, jak i do banku hipotecznego;","C":"list zastawny jest dłużnym instrumentem finansowym wyemitowanym przez bank niebędący spółką akcyjną, który jest zabezpieczony aktywami stanowiącymi zabezpieczenie listów zastawnych;","D":"list zastawny jest dłużnym papierem wartościowym wyemitowanym przez bank niebędący spółką akcyjną, który jest zabezpieczony aktywami stanowiącymi zabezpieczenie listów zastawnych, względem których posiadaczom listów zastawnych przysługuje pośrednio roszczenie zarówno do osobnej masy upadłości wyodrębnionej zgodnie z przepisami ustawy Prawo upadłościowe, jak i do banku hipotecznego."}},{"number":28,"text":"Czy po wygaśnięciu umocowania pełnomocnik jest obowiązany zwrócić mocodawcy dokument pełnomocnictwa?","options":{"A":"tak;","B":"wyłącznie wtedy, kiedy zwrotu dokumentu pełnomocnictwa zażąda mocodawca;","C":"nie;","D":"pełnomocnik ma obowiązek zniszczyć dokument pełnomocnictwa."}},{"number":29,"text":"Czy, zgodnie z przepisami ustawy o ofercie publicznej i warunkach wprowadzania instrumentów finansowych do zorganizowanego systemu obrotu oraz o spółkach publicznych, emitent kwitów depozytowych, dopuszczonych do obrotu na rynku regulowanym na terytorium Rzeczypospolitej Polskiej, jest obowiązany do przekazywania informacji dotyczących własnej sytuacji finansowej lub prawnej?","options":{"A":"nie;","B":"tak, o ile mogłaby ona w istotny sposób wpłynąć na możliwość wywiązania się przez niego z obowiązków wynikających z wyemitowania kwitów depozytowych;","C":"tak, ale jedynie kiedy taka informacja wpłynęła na wywiązanie się przez niego z obowiązków wynikających z wyemitowania kwitów depozytowych;","D":"tak, o ile o takie informacje wystąpi nabywca kwitów depozytowych."}},{"number":30,"text":"Wskaż produkt, który nie jest \"produktem finansowym\" w rozumieniu Rozporządzenia Parlamentu i Rady (UE) 2019/2088 z dnia 27 listopada 2019 r. w sprawie ujawniania informacji związanych ze zrównoważonym rozwojem w sektorze usług finansowych (zwanym też: SFDR):","options":{"A":"produkt emerytalny;","B":"program emerytalny;","C":"UCITS;","D":"kredyt hipoteczny."}}];
        const ANSWER_KEY  = {"1": "A", "2": "A", "3": "B", "4": "A", "5": "A", "6": "A", "7": "A", "8": "A", "9": "B", "10": "A", "11": "B", "12": "A", "13": "A", "14": "A", "15": "B", "16": "B", "17": "C", "18": "A", "19": "D", "20": "A", "21": "D", "22": "D", "23": "A", "24": "A", "25": "B", "26": "A", "27": "A", "28": "A", "29": "B", "30": "D"};
        const EXPLANATIONS = {"1": "Odpowiedź A jest nieprawdziwa, ponieważ zgodnie z MSR 2 \"Zapasy\" (par. 9) zapasy wycenia się w kwocie NIŻSZEJ z ceny nabycia/kosztu wytworzenia i wartości netto możliwej do uzyskania (NRV) – a nie wyższej, jak twierdzi opcja A. Celem tej zasady jest unikanie wykazywania zapasów po wartości wyższej niż kwota, którą jednostka spodziewa się uzyskać ze sprzedaży. Pozostałe opcje B, C i D zawierają definicje i przykłady zgodne z MSR 2.", "2": "Zgodnie z art. 48 ust. 2 ustawy Prawo przedsiębiorców, kontrolę wszczyna się nie wcześniej niż po upływie 7 dni i nie później niż przed upływem 30 dni od dnia doręczenia zawiadomienia o zamiarze wszczęcia kontroli. Jeżeli kontrola nie zostanie wszczęta w tym terminie, wszczęcie kontroli wymaga ponownego zawiadomienia. Przepis ten ma na celu ochronę przedsiębiorcy przed nieokreślonym zawieszeniem stanu niepewności – organ traci uprawnienie wynikające z pierwotnego zawiadomienia i musi zainicjować procedurę od nowa.", "3": "Na podstawie przepisów ustawy o ofercie publicznej dotyczących finansowania społecznościowego (crowdfunding), dostawca usług finansowania społecznościowego jest obowiązany przekazać Komisji Nadzoru Finansowego arkusz kluczowych informacji inwestycyjnych na co najmniej 7 dni roboczych przed dniem jego udostępnienia do publicznej wiadomości. Termin ten umożliwia KNF weryfikację dokumentu przed jego publikacją. Opcje C (5 dni) i D (10 dni) podają błędne okresy, natomiast opcja A (brak obowiązku) jest sprzeczna z ustawą.", "4": "Ustawa o nadzorze nad rynkiem kapitałowym przyznaje upoważnionym pracownikom UKNF prawo do przeprowadzania w domach maklerskich wizyt nadzorczych w zakresie niezbędnym do nadzoru ostrożnościowego. Jest to instrument nadzoru o charakterze inspekcyjnym, mniej formalny niż kontrola, pozwalający na bieżące monitorowanie sytuacji w DM. Opcja B błędnie neguje takie uprawnienie, opcja C zawęża je tylko do regulaminów, a opcja D błędnie ogranicza czas wizyty do 30 dni.", "5": "Art. 72 ust. 1 ustawy o funduszach inwestycyjnych i zarządzaniu alternatywnymi funduszami inwestycyjnymi określa kompleksowy zakres zadań depozytariusza: przechowywanie aktywów, prowadzenie rejestru aktywów funduszu inwestycyjnego lub ASI oraz zapewnienie właściwego monitorowania przepływu środków pieniężnych tych podmiotów. Opcje B, C i D zawierają tylko wybrane elementy tego katalogu, opisując zadania depozytariusza w sposób niekompletny lub ograniczony do jednego podmiotu.", "6": "Prawo bankowe nakłada na komitet do spraw nominacji w banku obowiązek przyjęcia polityki różnorodności w składzie zarządu banku. Polityka ta powinna obejmować kryteria dotyczące wykształcenia, doświadczenia zawodowego, płci i wieku. Jest to wymóg wynikający z implementacji unijnych wytycznych EBA dotyczących wewnętrznego zarządzania bankami. Opcje B, C i D błędnie przypisują to zadanie innym organom lub zawężają jego zakres.", "7": "Zgodnie z ustawą o obrocie instrumentami finansowymi, posiadanie akcji spółki akcyjnej prowadzącej rynek regulowany przez podmioty pozostające w tej samej grupie kapitałowej uważa się za ich posiadanie przez jeden podmiot. Przepis ten ma zapobiegać obchodzeniu limitów koncentracji własności w spółkach prowadzących infrastrukturę rynkową poprzez rozproszenie akcji pomiędzy podmiotami powiązanymi.", "8": "Zgodnie z art. 5 ust. 2 ustawy o nadzorze nad rynkiem finansowym, organami Urzędu Komisji Nadzoru Finansowego są Komisja Nadzoru Finansowego oraz Przewodniczący Komisji Nadzoru Finansowego. UKNF jest aparatem wykonawczym KNF i nie posiada odrębnych organów poza KNF i jej Przewodniczącym. Pozostałe opcje są błędne, ponieważ albo wymieniają tylko jeden organ, albo twierdzą, że UKNF nie posiada żadnych organów.", "9": "Ustawa o nadzorze nad rynkiem finansowym stanowi, że informacje dotyczące imienia i nazwiska osoby, której dotyczy decyzja KNF nakładająca karę za naruszenie MAR (rozporządzenie 596/2014), są udostępniane na stronie internetowej KNF przez okres 5 lat, licząc od dnia ich udostępnienia. Podstawą jest art. 96e ust. 3 ustawy o nadzorze nad rynkiem finansowym, implementujący wymogi art. 34 MAR. Opcja C (1 rok od udostępnienia) i D (1 rok od decyzji) podają błędne okresy.", "10": "Art. 8 §1 Kodeksu cywilnego wyraźnie stanowi, że każdy człowiek ma zdolność prawną od chwili urodzenia. Zdolność prawna to zdolność do bycia podmiotem praw i obowiązków cywilnoprawnych. Powstaje z chwilą urodzenia się dziecka żywego i trwa do chwili śmierci. Nie jest uzależniona od osiągnięcia pełnoletności, zawarcia małżeństwa ani żadnego innego zdarzenia.", "11": "Po nowelizacji MSR 8 (obowiązującej od 2023 r.), standard wprowadził definicję \"wartości szacunkowych\" jako kwot w sprawozdaniu finansowym podlegających niepewności wyceny. Przykłady wskazane w opcji B – odpis na oczekiwane straty kredytowe (MSSF 9) oraz NRV zapasów (MSR 2) – są wprost wymienione w zmienionym standardzie. Opcja A jest fałszywa (zmiana szacunku nie jest korektą błędu), opcja C jest fałszywa (amortyzacja IS przykładem szacunku), a D jest fałszywa (wątpliwa zmiana traktowana jest jako zmiana szacunku, nie polityki).", "12": "Art. 2 pkt 10a ustawy o funduszach inwestycyjnych i zarządzaniu alternatywnymi funduszami inwestycyjnymi definiuje AFI jako instytucję wspólnego inwestowania, której przedmiotem działalności jest zbieranie aktywów od wielu inwestorów w celu ich lokowania w interesie tych inwestorów zgodnie z określoną polityką inwestycyjną, przy czym nie jest ona funduszem UCITS (działającym zgodnie z prawem UE regulującym zbiorowe inwestowanie w PW). Kluczowym elementem definicji jest wyłączenie funduszy UCITS oraz brak ograniczenia do 150 inwestorów.", "13": "Art. 9a ust. 1 Prawa bankowego stanowi, że zarząd banku odpowiada za wprowadzenie i zapewnienie działania systemu zarządzania. Jest to jeden z podstawowych obowiązków zarządu jako organu zarządzającego bankiem, obejmujący m.in. system kontroli wewnętrznej, zarządzanie ryzykiem i compliance. Rada nadzorcza sprawuje nadzór nad tym systemem, ale to zarząd jest odpowiedzialny za jego funkcjonowanie.", "14": "Prawo bankowe nakłada na banki istotne obowiązek posiadania zarówno komitetu do spraw wynagrodzeń, jak i komitetu do spraw ryzyka. Obowiązek ten wynika z implementacji dyrektywy CRD IV. \"Bank istotny\" to bank spełniający kryteria znaczenia systemowego określone w ustawie. Opcja B jest błędna, bo wymóg dotyczy właśnie banków istotnych, a nie każdego banku.", "15": "Ustawa o obrocie instrumentami finansowymi (art. dotyczący spółek prowadzących rynek regulowany) zezwala na organizowanie rynków wyodrębnionych, przy czym wyodrębniony rynek powinien odnosić się do rodzaju papierów wartościowych lub innych instrumentów finansowych, jak również rodzaju ich emitentów. Możliwość ta dotyczy więc zarówno kryterium instrumentu, jak i kryterium emitenta – łącznie lub rozdzielnie.", "16": "Art. 44c ust. 5 ustawy o rachunkowości stanowi wprost: \"Koszty poniesione w związku z połączeniem, w tym również koszty organizacji poniesione przy założeniu nowej spółki lub koszty podwyższenia kapitału spółki, na którą przechodzi majątek łączących się spółek, zalicza się do kosztów finansowych.\" Przepis jest jednoznaczny i nie przewiduje żadnych wyjątków – koszty te trafiają do kosztów finansowych (opcja B), a nie do kosztów ogólnego zarządu (D), kosztów operacyjnych (C) ani strat nadzwyczajnych (A). Klasyfikacja do kosztów finansowych wynika z charakteru połączenia – jest to operacja o naturze finansowo-kapitałowej, a nie operacyjnej.", "17": "Art. 3 pkt 7 lit. b ustawy o obrocie instrumentami finansowymi definiuje obrót wtórny (lit. b) jako: proponowanie w dowolnej formie i w dowolny sposób, przez podmiot inny niż wystawca, nabycia instrumentów finansowych NIEBĘDĄCYCH papierami wartościowymi lub nabywanie ich od tego innego podmiotu, jeżeli propozycja skierowana jest do co najmniej 150 osób lub do nieoznaczonego adresata. Opcja C dokładnie odwzorowuje brzmienie tej litery. Opcja B była błędna z dwóch powodów jednocześnie: (1) błędnie wskazywała instrumenty finansowe BĘDĄCE papierami wartościowymi (lit. b dotyczy wyłącznie niebędących PW – obrót wtórny PW przebiega przez lit. a, tj. ofertę publiczną), oraz (2) błędnie podawała próg 200 osób zamiast ustawowego progu 150 osób.", "18": "MSSF 3 \"Połączenia jednostek\" (par. 5) wymaga przy zastosowaniu metody przejęcia: (1) zidentyfikowania jednostki przejmującej, (2) ustalenia dnia przejęcia, (3) ujęcia i wyceny możliwych do zidentyfikowania przejętych aktywów, zobowiązań i udziałów niekontrolujących oraz (4) ujęcia i wyceny wartości firmy lub zysku z tytułu okazyjnego nabycia. Odpowiedź A poprawnie wskazuje pierwszy krok. Opcja B jest błędna – dniem przejęcia jest dzień uzyskania kontroli, nie znaczącego wpływu.", "19": "Art. 3 ust. 1 pkt 29 ustawy o rachunkowości definiuje aktywa netto jako aktywa jednostki pomniejszone o zobowiązania, odpowiadające wartościowo kapitałowi (funduszowi) własnemu. Jest to tożsame z wartością netto majątku jednostki, czyli tym, co pozostaje po odjęciu wszystkich zobowiązań od całości aktywów. Definicja ta jest fundamentem bilansu w polskiej rachunkowości.", "20": "Na mocy art. 4 rozporządzenia (WE) nr 1606/2002 Parlamentu Europejskiego i Rady, skonsolidowane sprawozdania finansowe emitentów papierów wartościowych, których PW są dopuszczone do obrotu na rynku regulowanym w UE, muszą być sporządzane zgodnie z MSR. Jest to wymóg bezwzględny – decyzja organu zatwierdzającego banku nie jest potrzebna. Ustawa o rachunkowości potwierdza ten obowiązek dla banków w art. 55 ust. 5.", "21": "Art. 3 pkt 9a ustawy o obrocie instrumentami finansowymi definiuje obrót zorganizowany jako obrót papierami wartościowymi lub innymi instrumentami finansowymi dokonywany na terytorium Rzeczypospolitej Polskiej na rynku regulowanym albo w alternatywnym systemie obrotu (ASO). Definicja obejmuje oba typy instrumentów (nie tylko PW) i oba typy platform (rynek regulowany i ASO).", "22": "Art. 2 pkt 1 SFDR (rozporządzenie 2019/2088) zawiera zamknięty katalog \"uczestników rynku finansowego\". Bank jest uczestnikiem tylko wtedy, gdy świadczy usługę zarządzania portfelem. Bank, który tej usługi nie świadczy, nie jest uczestnikiem rynku finansowego w rozumieniu SFDR i nie podlega jej obowiązkom informacyjnym. Zakład ubezpieczeń oferujący IBIP (A), firma inwestycyjna świadcząca zarządzanie portfelem (B) i IORP (C) są wprost wymienione w katalogu.", "23": "Art. 93 ust. 1 Prawa bankowego zakazuje bankowi udzielania kredytów i pożyczek pieniężnych na kupno lub objęcie wyemitowanych przez siebie bankowych papierów wartościowych. Zakaz ten ma na celu zapobieganie sztucznemu kreowaniu popytu na własne instrumenty oraz zapewnienie integralności procesu emisji. Zakaz dotyczy zarówno kredytów, jak i pożyczek pieniężnych, więc opcja B (dopuszczająca pożyczkę) jest błędna.", "24": "Art. 4 ust. 1 SFDR nakłada na uczestników rynku finansowego obowiązek publikowania na swoich stronach internetowych informacji o strategiach dotyczących uwzględniania ryzyk dla zrównoważonego rozwoju w procesie podejmowania decyzji inwestycyjnych. Strona internetowa zapewnia transparentność i powszechny dostęp dla inwestorów. Sprawozdanie finansowe (B), raport dla zarządu (C) ani raport dla rady nadzorczej (D) nie są właściwym miejscem tej publikacji według SFDR.", "25": "Art. 450 §1 Kodeksu cywilnego stanowi, że wierzyciel nie może odmówić przyjęcia świadczenia częściowego, chociażby cała wierzytelność była już wymagalna, chyba że przyjęcie takiego świadczenia narusza jego uzasadniony interes. Przepis chroni dłużnika przed odmową częściowego zaspokojenia, jednocześnie chroniąc uzasadnione interesy wierzyciela – np. gdy częściowe spełnienie świadczenia nie jest dla niego ekonomicznie sensowne.", "26": "Art. 53 ust. 3 ustawy o ofercie publicznej uprawnia KNF do przekazywania do publicznej wiadomości istotnych informacji, które mogą mieć wpływ na ocenę papierów wartościowych będących przedmiotem oferty publicznej lub ubiegania się o dopuszczenie do obrotu na rynku regulowanym, w celu zapewnienia inwestorom ochrony lub prawidłowego działania rynku. Kompetencja KNF jest tu ograniczona do PW z oferty publicznej lub ubiegających się o dopuszczenie – nie dotyczy wszystkich instrumentów finansowych.", "27": "Art. 3 ust. 1 ustawy o listach zastawnych i bankach hipotecznych: list zastawny jest dłużnym papierem wartościowym wyemitowanym przez bank hipoteczny, zabezpieczonym aktywami stanowiącymi zabezpieczenie listów zastawnych, wobec których posiadaczom przysługuje bezpośrednio roszczenie zarówno do osobnej masy upadłości wyodrębnionej zgodnie z ustawą Prawo upadłościowe, jak i do banku hipotecznego. Kluczowe cechy: (1) emitent to bank hipoteczny, (2) roszczenie jest bezpośrednie – nie pośrednie jak w opcji D.", "28": "Art. 102 Kodeksu cywilnego stanowi, że po wygaśnięciu umocowania pełnomocnik obowiązany jest zwrócić mocodawcy dokument pełnomocnictwa. Może żądać poświadczonego odpisu tego dokumentu. Uprawnienie do żądania zwrotu nie jest warunkiem obowiązku zwrotu – pełnomocnik musi zwrócić dokument bez względu na to, czy mocodawca o to prosi, co wyklucza opcję B.", "29": "Ustawa o ofercie publicznej nakłada na emitenta kwitów depozytowych dopuszczonych do obrotu na rynku regulowanym na terytorium RP obowiązek przekazywania informacji dotyczących własnej sytuacji finansowej lub prawnej, o ile mogłyby one w istotny sposób wpłynąć na możliwość wywiązania się przez emitenta z obowiązków wynikających z wyemitowania kwitów. Jest to zasada proporcjonalności – obowiązek ujawnienia dotyczy tylko informacji materialnie istotnych dla zdolności obsługi kwitów.", "30": "Art. 2 pkt 12 SFDR definiuje \"produkt finansowy\" jako portfel zarządzany, AIF, IBIP (ubezpieczeniowy produkt inwestycyjny), program emerytalny, produkt emerytalny, UCITS lub OIPE. Kredyt hipoteczny nie mieści się w tej definicji – jest produktem kredytowym, nie inwestycyjnym. Mimo że inne produkty bankowe mogą być objęte SFDR, kredyt hipoteczny wprost nie figuruje w definicji."};
        const PASS_SCORE  = 40;
        const CORRECT_PTS = 2;
        const WRONG_PTS   = -1;

        let idx = 0;
        let ans = {};

        function display() {
            const q  = QUESTIONS[idx];
            const ak = JSON.parse(localStorage.getItem('answerKey')) || ANSWER_KEY;
            const selected = ans[idx];

            document.getElementById('currentQuestion').textContent = idx + 1;
            document.getElementById('progressFill').style.width =
                ((idx + 1) / QUESTIONS.length * 100) + '%';
            document.getElementById('questionText').textContent = q.text;

            let html = '';
            for (const [key, val] of Object.entries(q.options)) {
                const isSel  = selected === key;
                const cor    = ak[q.number];
                let cls = '';
                if (selected !== undefined && isSel)
                    cls = (key === cor) ? 'correct' : 'incorrect';

                const fb = (selected !== undefined && isSel)
                    ? `<span class="feedback">${key === cor ? '&#10003; Poprawnie' : '&#10007; Źle'}</span>`
                    : '';

                html += `
                    <div class="option ${cls} ${selected !== undefined ? 'answered' : ''}"
                         ${selected === undefined ? `data-key="${key}"` : ''}>
                        <span class="option-marker">${isSel ? (key === cor ? '&#10003;' : '&#10007;') : '&#9675;'}</span>
                        <span class="option-text">${key}: ${val}</span>
                        ${fb}
                    </div>`;
            }
            document.getElementById('optionsContainer').innerHTML = html;

            // Show explanation if wrong answer was selected
            const expBox = document.getElementById('explanationBox');
            if (selected !== undefined) {
                const cor = ak[q.number];
                if (selected !== cor && EXPLANATIONS[q.number]) {
                    expBox.innerHTML = '<span class="exp-label">Wyjaśnienie:</span> ' + EXPLANATIONS[q.number] + ' <em>Prawidłowa odpowiedź: <strong>' + cor + '</strong>.</em>';
                    expBox.classList.remove('hidden');
                } else {
                    expBox.innerHTML = '';
                    expBox.classList.add('hidden');
                }
            } else {
                expBox.innerHTML = '';
                expBox.classList.add('hidden');
            }

            document.getElementById('prevBtn').disabled = idx === 0;
            const last = idx === QUESTIONS.length - 1;
            document.getElementById('nextBtn').style.display   = last ? 'none'  : 'block';
            document.getElementById('finishBtn').style.display = last ? 'block' : 'none';
        }

        let pickLocked = false;
        function pick(key) {
            if (pickLocked) return;
            pickLocked = true;
            ans[idx] = key;
            display();
            setTimeout(() => { pickLocked = false; }, 300);
        }

        document.getElementById('prevBtn').addEventListener('click', function(e) {
            if (!e.isTrusted) return;
            if (idx > 0) { idx--; display(); }
        });
        document.getElementById('nextBtn').addEventListener('click', function(e) {
            if (!e.isTrusted) return;
            if (idx < QUESTIONS.length - 1) { idx++; display(); }
        });
        document.getElementById('finishBtn').addEventListener('click', function(e) {
            if (!e.isTrusted) return;
            finishQuiz();
        });

        document.getElementById('optionsContainer').addEventListener('click', function(e) {
            if (!e.isTrusted) return;
            const opt = e.target.closest('.option[data-key]');
            if (opt) pick(opt.dataset.key);
        });

        function finishQuiz() {
            const ak = JSON.parse(localStorage.getItem('answerKey')) || ANSWER_KEY;
            let correct = 0, wrong = 0, blank = 0;
            QUESTIONS.forEach((q, i) => {
                const u = ans[i], c = ak[q.number];
                if (!u) blank++; else if (u === c) correct++; else wrong++;
            });
            const score  = correct * CORRECT_PTS + wrong * WRONG_PTS;
            const max    = QUESTIONS.length * CORRECT_PTS;
            const passed = score >= PASS_SCORE;

            document.getElementById('resultStatus').textContent  = passed ? '✓ ZALICZONE' : '✗ NIEZALICZONE';
            document.getElementById('resultStatus').className    = 'result-status ' + (passed ? 'pass' : 'fail');
            document.getElementById('scoreDisplay').textContent  = score + ' / ' + max;
            document.getElementById('totalScore').textContent    = score;
            document.getElementById('correctCount').textContent  = correct;
            document.getElementById('correctPercent').textContent   = Math.round(correct / QUESTIONS.length * 100) + '%';
            document.getElementById('incorrectPercent').textContent = Math.round(wrong   / QUESTIONS.length * 100) + '%';
            document.getElementById('breakdownCorrect').textContent   = correct + ' × (+2) = +' + (correct * CORRECT_PTS);
            document.getElementById('breakdownIncorrect').textContent = wrong   + ' × (-1) = '  + (wrong * WRONG_PTS);
            document.getElementById('breakdownBlank').textContent     = blank   + ' × (0) = 0';

            document.getElementById('quizScreen').style.display    = 'none';
            document.getElementById('resultsScreen').style.display = 'block';
        }

        function retakeQuiz() {
            idx = 0; ans = {};
            document.getElementById('resultsScreen').style.display = 'none';
            document.getElementById('quizScreen').style.display    = 'block';
            display();
        }

        function exitQuiz() {
            if (confirm('Czy na pewno chcesz wyjść z quizu? Twój postęp zostanie utracony.'))
                window.location.href = '../index.html';
        }

        function goHome() { window.location.href = '../index.html'; }

        window.addEventListener('DOMContentLoaded', display);
    </script>
</body>
</html>
