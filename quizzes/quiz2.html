    <script>
        const QUESTIONS   = [{"number":1,"text":"Do którego momentu papiery wartościowe w liczbie wskazanej w treści imiennego świadectwa depozytowego nie mogą być przedmiotem obrotu?","options":{"A":"Do chwili utraty ważności przez to świadectwo depozytowe albo zwrotu tego świadectwa wystawiającemu przed upływem terminu jego ważności;","B":"Papiery wartościowe wskazane w tym świadectwie są zawsze przedmiotem obrotu;","C":"W terminie do końca dnia, w którym nastąpił zwrot świadectwa wystawiającemu, nawet jeżeli nie płynął termin ważności świadectwa;","D":"W terminie do końca dnia, w którym nastąpił zwrot świadectwa wystawiającemu, nawet jeżeli upłynął już termin ważności świadectwa."}},{"number":2,"text":"Wskaż, kto wyznacza biegłego rewidenta, który ma przeprowadzić badanie sprawozdania założycieli spółki akcyjnej:","options":{"A":"założyciele spółki wskazują biegłego w umowie spółki;","B":"akcjonariusze, którzy objęli wszystkie akcje spółki;","C":"sąd rejestrowy właściwy ze względu na siedzibę spółki;","D":"sąd rejestrowy właściwy dla m.st. Warszawy."}},{"number":3,"text":"Na podstawie Rozporządzenia Ministra Finansów w sprawie informacji bieżących i okresowych przekazywanych przez emitentów papierów wartościowych oraz warunków uznawania za równoważne informacji wymaganych przepisami prawa państwa niebędącego państwem członkowskim, wskaż stwierdzenie prawdziwe w odniesieniu do raportów kwartalnych emitentów akcji:","options":{"A":"obowiązek przekazywania do publicznej wiadomości dotyczy raportów kwartalnych za każdy kwartał roku obrotowego;","B":"w przypadku stosowania MSR kwartalne skrócone sprawozdanie finansowe, zawarte w raporcie kwartalnym, sporządza się zgodnie z zakresem określonym w MSR 1 \"Prezentacja sprawozdań finansowych\";","C":"w przypadku stosowania MSR kwartalne sprawozdanie finansowe, zawarte w raporcie kwartalnym, sporządza się w wersji skróconej, której zakres został określony w tych standardach;","D":"kwartalne sprawozdanie finansowe, zawarte w raporcie kwartalnym, podlega obowiązkowi przeglądu przez firmę audytorską."}},{"number":4,"text":"Wskaż, zgodnie z Kodeksem Dobrej Praktyki Domów Maklerskich, czy dom maklerski ma obowiązek udzielania odpowiedzi na pisemne reklamacje klientów:","options":{"A":"tak;","B":"tak, ale tylko wtedy jeżeli dom maklerski uzna, że reklamacja jest zasadna;","C":"nie, ponieważ dom maklerski nie ma obowiązku udzielania odpowiedzi na reklamacje;","D":"nie, przy czym wyniki analizy reklamacji dom maklerski przedstawia zarządowi domu maklerskiego."}},{"number":5,"text":"Czy oświadczenia woli w związku z dokonywaniem czynności dotyczących obrotu papierami wartościowymi lub innymi instrumentami finansowymi kierowane do firm inwestycyjnych mogą być składane w postaci elektronicznej?","options":{"A":"Tak, za wyjątkiem składania zleceń nabycia certyfikatów inwestycyjnych funduszy inwestycyjnych;","B":"Tak, za wyjątkiem składania zleceń nabycia instrumentów pochodnych;","C":"Tak;","D":"Mogą być składane wyłącznie w tradycyjnej formie papierowej oraz drogą telefonicznego kontaktu."}},{"number":6,"text":"Wskaż, zgodnie ze Statutem Związku Maklerów i Doradców, kto może być wybrany na Rzecznika Dyscyplinarnego Związku Maklerów i Doradców:","options":{"A":"Członek Zwyczajny Związku;","B":"doradca inwestycyjny, ale nie ma obowiązku aby należał do Związku Maklerów i Doradców;","C":"Członek Zwyczajny Związku, który jest członkiem Związku przez co najmniej 4 lata;","D":"Członek Nadzwyczajny Związku."}},{"number":7,"text":"Wskaż, zgodnie z Regulaminem Krajowego Depozytu Papierów Wartościowych S.A., czy uczestnicy prowadzący rachunki papierów wartościowych lub rachunki zbiorcze, zobowiązani są zatrudniać do prowadzenia ewidencji papierów wartościowych osoby posiadające odpowiednią wiedzę oraz doświadczenie lub kwalifikacje w tym zakresie:","options":{"A":"tak;","B":"Regulamin Krajowego Depozytu Papierów Wartościowych S.A. nie określa takiego obowiązku;","C":"tak, ale wyłącznie w zakresie dotyczącym rachunków zbiorczych;","D":"tak, przy czym Regulamin Krajowego Depozytu Papierów Wartościowych S.A. wprowadza wymóg posiadania odpowiedniego certyfikatu wydanego przez Krajowy Depozyt Papierów Wartościowych S.A."}},{"number":8,"text":"Kto reprezentuje osobę prawną lub prowadzi jej sprawy w sytuacji braku organu albo braku w składzie organu uprawnionego do reprezentowania tej osoby prawnej?","options":{"A":"Kurator ustanowiony przez organ właścicielski;","B":"Opiekun ustanowiony przez organ właścicielski;","C":"Opiekun ustanowiony przez sąd;","D":"Kurator ustanowiony przez sąd."}},{"number":9,"text":"Komisja Nadzoru Finansowego przyjmuje zgłoszenia naruszeń lub potencjalnych naruszeń przepisów ustawy o obrocie instrumentami finansowymi. Czy przekazanie Komisji Nadzoru Finansowego takiego zgłoszenia może stanowić przyczynę rozwiązania z osobą zgłaszającą umowy o pracę?","options":{"A":"Tak;","B":"Nie;","C":"Tak, o ile zgłoszenie dotyczy tylko faktycznych naruszeń;","D":"Tak, jeżeli zostanie wykazane, że dotyczy to jedynie potencjalnych naruszeń."}},{"number":10,"text":"Wskaż, zgodnie z Kodeksem Dobrej Praktyki Domów Maklerskich, czy dom maklerski ma obowiązek informować klienta o istniejących i potencjalnych czynnikach ryzyka wynikających z właściwości poszczególnych instrumentów finansowych:","options":{"A":"tak, o ile klient złoży wniosek o informowanie go w takim zakresie;","B":"tak, ale dotyczy to wyłącznie instrumentów finansowych, które nie są papierami wartościowymi;","C":"tak, dom maklerski ma taki obowiązek;","D":"dom maklerski nie ma takiego obowiązku."}},{"number":11,"text":"Wskaż, zgodnie ze Statutem Związku Maklerów i Doradców, zdanie prawdziwe dotyczące Sądu Dyscyplinarnego Związku Maklerów i Doradców:","options":{"A":"Sąd Dyscyplinarny nie może wystąpić do Komisji Nadzoru Finansowego o skreślenie z listy maklerów lub doradców albo o zawieszenie uprawnień do wykonywania zawodu, wskazując ustawowe przesłanki odpowiednio skreślenia lub zawieszenia;","B":"Sąd Dyscyplinarny może wystąpić do Komisji Nadzoru Finansowego o skreślenie z listy maklerów lub doradców albo o zawieszenie uprawnień do wykonywania zawodu, wskazując ustawowe przesłanki odpowiednio skreślenia lub zawieszenia;","C":"w Statucie Związku Maklerów i Doradców brak jest postanowienia dotyczącego wystąpienia Sądu Dyscyplinarnego do Komisji Nadzoru Finansowego w sprawie skreślenia z listy maklerów lub doradców albo o zawieszenie uprawnień do wykonywania zawodu;","D":"Sąd Dyscyplinarny może wystąpić do Urzędu Komisji Nadzoru Finansowego o skreślenie z listy maklerów lub doradców albo o zawieszenie uprawnień do wykonywania zawodu, wskazując ustawowe przesłanki odpowiednio skreślenia lub zawieszenia."}},{"number":12,"text":"Na podstawie ustawy o rachunkowości, wskaż stwierdzenie prawdziwe:","options":{"A":"przez \"rezerwy\" rozumie się zobowiązania, których termin wymagalności lub kwota nie są pewne;","B":"przez \"znaczącego inwestora\" rozumie się jednostkę, która sprawuje kontrolę nad jednostką zależną;","C":"przez \"jednostkę stowarzyszoną\" rozumie się jednostkę, która jest współkontrolowana przez wspólników na podstawie zawartej pomiędzy nimi umowy, umowy spółki lub statutu;","D":"do instrumentów finansowych zalicza się rezerwy i aktywa z tytułu odroczonego podatku dochodowego."}},{"number":13,"text":"Przyjmując założenie, że statut spółki akcyjnej nie określa minimalnej wysokości kapitału zakładowego, wskaż, kiedy następuje zawiązanie spółki akcyjnej w organizacji:","options":{"A":"z chwilą objęcia wszystkich akcji przez akcjonariuszy;","B":"z chwilą objęcia minimum 50% akcji przez akcjonariuszy;","C":"z chwilą objęcia wszystkich akcji przez akcjonariusza większościowego;","D":"z chwilą objęcia minimum 50% akcji przez akcjonariusza większościowego."}},{"number":14,"text":"Na czyje żądanie posiadacz rachunku zbiorczego przekazuje dane identyfikujące osoby uprawnione z papierów wartościowych zapisanych na rachunku zbiorczym oraz dane o liczbie i rodzaju papierów wartościowych posiadanych przez te osoby?","options":{"A":"Na żądanie Komisji Nadzoru Finansowego albo Generalnego Inspektora Informacji Finansowej;","B":"Na żądanie Przewodniczącego Komisji Nadzoru Finansowego;","C":"Na żądanie wyłącznie Komisji Nadzoru Finansowego;","D":"Na żądanie wyłącznie Generalnego Inspektora Informacji Finansowej."}},{"number":15,"text":"Od kiedy człowiek ma zdolność prawną?","options":{"A":"Od chwili urodzenia;","B":"Od chwili uzyskania pełnoletności;","C":"Od chwili zawarcia małżeństwa przed uzyskaniem pełnoletności;","D":"Od chwili ukończenia lat trzynastu."}},{"number":16,"text":"Zgodnie z MSSF 5 \"Aktywa trwałe przeznaczone do sprzedaży oraz działalność zaniechana\", zatwierdzonym przez UE, jednostka wycenia składnik aktywów trwałych (lub grupę do zbycia) zaklasyfikowany jako przeznaczony do sprzedaży w kwocie:","options":{"A":"równej jego wartości godziwej;","B":"wyższej z jego wartości bilansowej i wartości godziwej pomniejszonej o koszty sprzedaży;","C":"niższej z jego wartości bilansowej i wartości godziwej pomniejszonej o koszty sprzedaży;","D":"wyższej z jego wartości godziwej i wartości użytkowej."}},{"number":17,"text":"Wskaż, kiedy rezydenci i nierezydenci Rzeczypospolitej Polskiej są obowiązani zgłaszać, w formie pisemnej, polskim organom celnym lub organom Straży Granicznej, przywóz do oraz wywóz za granicę Rzeczypospolitej Polskiej złota dewizowego lub platyny dewizowej:","options":{"A":"przekraczając granicę państwową Rzeczypospolitej Polskiej;","B":"przekraczając granicę państwową Rzeczypospolitej Polskiej wyłącznie drogą lotniczą;","C":"przekraczając granicę Unii Europejskiej;","D":"taki obowiązek nie został określony w przepisach prawa."}},{"number":18,"text":"Czy podmiot prowadzący zagraniczny rynek regulowany działający na terytorium innego państwa członkowskiego Unii Europejskiej może bez zezwolenia Komisji Nadzoru Finansowego instalować na terytorium Rzeczypospolitej Polskiej systemy informatyczne i urządzenia techniczne umożliwiające dostęp do tego rynku podmiotom prowadzącym działalność na terytorium Rzeczypospolitej Polskiej?","options":{"A":"Tak, przy czym warunkiem podjęcia takich czynności jest poinformowanie Komisji Nadzoru Finansowego przez właściwy organ nadzoru, który udzielił temu podmiotowi zezwolenia na prowadzenie rynku regulowanego, o zamiarze podjęcia takich czynności;","B":"Tak, ale wyłącznie jeżeli taki podmiot uzyska zezwolenie Komisji Nadzoru Finansowego;","C":"Tak, przy czym warunkiem podjęcia takich czynności jest poinformowanie Komisji Nadzoru Finansowego przez ten podmiot o zamiarze podjęcia takich czynności;","D":"Tak, ale wyłącznie jeżeli taki podmiot uzyska wpis do właściwego rejestru organu nadzoru, który udzielił temu podmiotowi zezwolenia na prowadzenie rynku regulowanego w innym państwie członkowskim Unii Europejskiej."}},{"number":19,"text":"Przez tytuły uczestnictwa w instytucjach wspólnego inwestowania rozumie się:","options":{"A":"wyemitowane na podstawie właściwych przepisów prawa polskiego lub obcego papiery wartościowe lub niebędące papierami wartościowymi instrumenty finansowe reprezentujące prawa majątkowe przysługujące uczestnikom instytucji wspólnego inwestowania, w tym w szczególności jednostki uczestnictwa funduszy inwestycyjnych;","B":"wyemitowane na podstawie właściwych przepisów prawa polskiego lub obcego papiery wartościowe lub niebędące papierami wartościowymi instrumenty finansowe reprezentujące prawa majątkowe przysługujące uczestnikom instytucji wspólnego inwestowania, z wyjątkiem jednostek uczestnictwa funduszy inwestycyjnych;","C":"wyemitowane na podstawie właściwych przepisów prawa polskiego lub obcego papiery wartościowe lub niebędące papierami wartościowymi instrumenty finansowe reprezentujące prawa majątkowe przysługujące uczestnikom instytucji wspólnego inwestowania, z wyjątkiem jednostek uczestnictwa specjalistycznych funduszy inwestycyjnych;","D":"wyemitowane na podstawie właściwych przepisów prawa polskiego lub obcego papiery wartościowe lub niebędące papierami wartościowymi instrumenty finansowe reprezentujące prawa majątkowe przysługujące uczestnikom instytucji wspólnego inwestowania, z wyjątkiem jednostek uczestnictwa funduszy inwestycyjnych zamkniętych."}},{"number":20,"text":"Co potwierdza imienne świadectwo depozytowe?","options":{"A":"Potwierdza posiadanie rachunku instrumentów finansowych;","B":"Potwierdza prawo uczestnictwa w walnym zgromadzeniu;","C":"Potwierdza legitymację do realizacji uprawnień wynikających z zapisów na rachunku papierów wartościowych, z wyłączeniem prawa uczestnictwa w walnym zgromadzeniu;","D":"Potwierdza legitymację do realizacji uprawnień wynikających z papierów wartościowych wskazanych w jego treści, które nie są lub nie mogą być realizowane wyłącznie na podstawie zapisów na rachunku papierów wartościowych, z wyłączeniem prawa uczestnictwa w walnym zgromadzeniu."}},{"number":21,"text":"Wskaż zadanie prawdziwe w odniesieniu do emisji bankowych papierów wartościowych:","options":{"A":"banki mogą emitować bankowe papiery wartościowe na warunkach podawanych do publicznej wiadomości;","B":"banki nie mogą emitować bankowych papierów wartościowych;","C":"banki mogą emitować bankowe papiery wartościowe na warunkach podawanych do wiadomości ich akcjonariuszy;","D":"banki mogą emitować bankowe papiery wartościowe na warunkach podawanych do wiadomości wybranych przez dany bank akcjonariuszy."}},{"number":22,"text":"Wskaż, zgodnie ze Statutem Związku Maklerów i Doradców, najwyższy organ Związku:","options":{"A":"Zjazd Maklerów i Doradców;","B":"Zarząd Związku Maklerów i Doradców;","C":"Komisja Rewizyjna Związku Maklerów i Doradców;","D":"Sąd Dyscyplinarny Związku Maklerów i Doradców."}},{"number":23,"text":"Zgodnie z MSR 38 \"Wartości niematerialne\", zatwierdzonym przez UE, prawdą jest, że:","options":{"A":"termin \"składnik wartości niematerialnych\" oznacza możliwy do zidentyfikowania niepieniężny składnik aktywów, nieposiadający postaci fizycznej;","B":"wystarczającym warunkiem ujęcia (w sprawozdaniu z sytuacji finansowej) składnika wartości niematerialnych jest udowodnienie, że jest prawdopodobne, że jednostka osiągnie przyszłe korzyści ekonomiczne, które można przyporządkować danemu składnikowi aktywów;","C":"składnik wartości niematerialnych wycenia się, po początkowym ujęciu, zawsze z wykorzystaniem modelu opartego na wartości przeszacowanej;","D":"nakłady na wytworzone przez jednostkę we własnym zakresie marki i listy klientów ujmuje się jako składniki wartości niematerialnych."}},{"number":24,"text":"Wskaż, w jaki sposób powinny być dokonane wpłaty na akcje spółki akcyjnej w organizacji:","options":{"A":"wpłaty powinny być dokonane bezpośrednio lub za pośrednictwem firmy inwestycyjnej, na rachunek spółki w organizacji prowadzony przez bank na terytorium Unii Europejskiej lub państwa będącego stroną umowy o Europejskim Obszarze Gospodarczym;","B":"wpłaty powinny być dokonane bezpośrednio lub za pośrednictwem firmy inwestycyjnej, na rachunek spółki w organizacji prowadzony przez bank na terytorium Rzeczypospolitej Polskiej;","C":"wpłaty powinny być dokonane bezpośrednio na rachunek spółki w organizacji prowadzony przez bank na terytorium Unii Europejskiej lub państwa będącego stroną umowy o Europejskim Obszarze Gospodarczym;","D":"wpłaty powinny być dokonane za pośrednictwem firmy inwestycyjnej na rachunek spółki w organizacji prowadzony przez bank na terytorium Unii Europejskiej lub państwa będącego stroną umowy o Europejskim Obszarze Gospodarczym."}},{"number":25,"text":"Wskaż organ spółki akcyjnej, który dokonuje wyboru podmiotu prowadzącego rejestr akcjonariuszy tej spółki:","options":{"A":"zarząd;","B":"walne zgromadzenie;","C":"prezes zarządu;","D":"żaden organ spółki akcyjnej nie dokonuje takiego wyboru, ponieważ to, kto prowadzi rejestr akcjonariuszy spółki akcyjnej wynika z przepisów prawa."}},{"number":26,"text":"Wskaż, jakie działania powinna podjąć firma inwestycyjna świadcząca usługi wykonywania zleceń nabycia lub zbycia instrumentów finansowych w związku z wykonaniem zlecenia klienta:","options":{"A":"firma inwestycyjna powinna podjąć wszelkie uzasadnione działania w celu uzyskania możliwie najlepszych wyników dla klienta, uwzględniając w szczególności cenę instrumentu finansowego, koszty związane z wykonaniem zlecenia, czas zawarcia transakcji, prawdopodobieństwo zawarcia transakcji oraz jej rozliczenia, wielkość zlecenia i jego charakter;","B":"firma inwestycyjna powinna podjąć wszelkie uzasadnione działania w celu uzyskania możliwie najlepszych wyników dla klienta, uwzględniając jednakże wyłącznie cenę instrumentu finansowego i koszty związanymi z wykonaniem zlecenia;","C":"firma inwestycyjna powinna podjąć wszelkie uzasadnione działania w celu uzyskania możliwie najlepszych wyników dla klienta, uwzględniając jednakże wielkość i charakter zleceń złożonych przez pozostałych klientów firmy inwestycyjnej;","D":"z obowiązujących przepisów prawa nie wynika obowiązek, aby firma inwestycyjna, świadcząc takie czynności, miała kierować się wymogami takimi jak cena instrumentu finansowego, koszty związane z wykonaniem zlecenia, czas zawarcia transakcji, prawdopodobieństwo zawarcia transakcji oraz jej rozliczenia, wielkość zlecenia i jego charakter."}},{"number":27,"text":"Zgodnie z MSSF 10 \"Skonsolidowane sprawozdania finansowe\", zatwierdzonym przez UE, jednostka dominująca przedstawia \"udziały niekontrolujące\" w swoim skonsolidowanym sprawozdaniu z sytuacji finansowej, w:","options":{"A":"kapitale własnym, oddzielnie od kapitału własnego właścicieli jednostki dominującej;","B":"kapitałach rezerwowych;","C":"zobowiązaniach finansowych;","D":"rezerwach."}},{"number":28,"text":"W jakiej formie następuje zbycie przedsiębiorstwa?","options":{"A":"W formie umowy cywilnoprawnej zawartej przez prokurentów;","B":"W formie pisemnej;","C":"W formie pisemnej z podpisami notarialnie poświadczonymi;","D":"W formie postanowienia wydanego przez sąd rejestrowy."}},{"number":29,"text":"Zgodnie z ustawą o rachunkowości, w przypadku umorzenia akcji własnych, w spółce akcyjnej, dodatnią różnicę między ich wartością nominalną a ceną nabycia należy odnieść na:","options":{"A":"kapitał zakładowy;","B":"kapitał zapasowy;","C":"zobowiązania długoterminowe;","D":"rezerwy na zobowiązania."}},{"number":30,"text":"Wskaż, zgodnie z ustawą Kodeks spółek handlowych, ile powinien wynosić kapitał zakładowy spółki akcyjnej:","options":{"A":"co najmniej 100 000 złotych;","B":"co najmniej 100 000 euro;","C":"co najmniej 10 000 złotych;","D":"co najmniej 10 000 euro."}}];
        const ANSWER_KEY  = {"1": "A", "2": "C", "3": "C", "4": "A", "5": "C", "6": "C", "7": "A", "8": "D", "9": "B", "10": "C", "11": "B", "12": "A", "13": "A", "14": "A", "15": "A", "16": "C", "17": "A", "18": "A", "19": "A", "20": "D", "21": "A", "22": "A", "23": "A", "24": "A", "25": "B", "26": "A", "27": "A", "28": "C", "29": "B", "30": "A"};
        const EXPLANATIONS = {"1": "Ustawa o obrocie instrumentami finansowymi stanowi, że papiery wartościowe w liczbie wskazanej w treści imiennego świadectwa depozytowego nie mogą być przedmiotem obrotu do chwili utraty ważności przez to świadectwo albo zwrotu świadectwa wystawiającemu przed upływem terminu jego ważności. Mechanizm ten zapobiega jednoczesnej realizacji uprawnień z PW (np. na WZA) i ich sprzedaży, blokując możliwość obrotu na czas ważności świadectwa.", "2": "Art. 312 §1 KSH wskazuje, że biegłego rewidenta do zbadania sprawozdania założycieli spółki akcyjnej wyznacza sąd rejestrowy właściwy ze względu na siedzibę spółki. Wyznaczenie przez sąd – a nie przez założycieli lub akcjonariuszy – ma na celu zagwarantowanie niezależności badania i ochronę przyszłych akcjonariuszy przed manipulowaniem wyceną wkładów. Opcja D (sąd właściwy dla m.st. Warszawy) podaje błędne kryterium właściwości sądu.", "3": "Rozporządzenie Ministra Finansów w sprawie informacji bieżących i okresowych stanowi, że w przypadku stosowania MSR kwartalne sprawozdanie finansowe zawarte w raporcie kwartalnym sporządza się w wersji skróconej, której zakres został określony w tych standardach – tj. zgodnie z MSR 34 \"Śródroczna sprawozdawczość finansowa\". Opcja B błędnie wskazuje MSR 1 jako podstawę zakresu sprawozdania kwartalnego. Opcja D jest błędna – sprawozdanie kwartalne nie podlega obowiązkowemu przeglądowi przez biegłego rewidenta.", "4": "Kodeks Dobrej Praktyki Domów Maklerskich wyraźnie stanowi, że dom maklerski ma obowiązek udzielania odpowiedzi na pisemne reklamacje klientów. Obowiązek ten ma charakter bezwzględny – nie jest uzależniony od uznania zasadności reklamacji przez DM. Opcja B jest błędna, ponieważ odpowiedź musi być udzielona niezależnie od oceny merytorycznej reklamacji. Brak odpowiedzi na reklamację stanowi naruszenie standardów etycznych i regulacyjnych.", "5": "Ustawa o obrocie instrumentami finansowymi wprost dopuszcza składanie oświadczeń woli dotyczących czynności w zakresie obrotu PW i innymi instrumentami finansowymi kierowanych do firm inwestycyjnych w postaci elektronicznej, bez wyjątków. Opcje A i B błędnie wprowadzają ograniczenia (certyfikaty inwestycyjne, instrumenty pochodne), które nie wynikają z przepisów. Opcja D jest całkowicie błędna – forma elektroniczna jest dopuszczona.", "6": "Statut Związku Maklerów i Doradców stanowi, że Rzecznikiem Dyscyplinarnym może być Członek Zwyczajny Związku, który jest członkiem Związku przez co najmniej 4 lata. Wymóg minimalnego stażu członkowskiego ma zapewnić odpowiednie doświadczenie w środowisku profesjonalnym. Opcja A pomija wymóg stażu, opcja B błędnie sugeruje, że doradca nie musi być członkiem ZMiD, a opcja D wskazuje na Członka Nadzwyczajnego, który nie spełnia wymogów.", "7": "Regulamin Krajowego Depozytu Papierów Wartościowych S.A. nakłada na uczestników prowadzących rachunki PW lub rachunki zbiorcze obowiązek zatrudniania do prowadzenia ewidencji PW osób posiadających odpowiednią wiedzę, doświadczenie lub kwalifikacje. Wymóg ten zapewnia bezpieczeństwo i prawidłowość ewidencjonowania PW na poziomie uczestników KDPW. Opcja D błędnie dodaje wymóg certyfikatu wydanego przez KDPW, który nie wynika z Regulaminu.", "8": "Art. 42 §1 Kodeksu cywilnego stanowi, że jeżeli osoba prawna nie może prowadzić swoich spraw z braku powołanych do tego organów, sąd ustanawia dla niej kuratora. Kuratora ustanawia zatem sąd – nie organ właścicielski. Kurator (nie opiekun) jest właściwą instytucją dla osób prawnych, a opiekun stosowany jest przy osobach fizycznych nieposiadających zdolności do czynności prawnych. Opcje A i B błędnie wskazują organ właścicielski, a opcja C myli kuratora z opiekunem.", "9": "Art. 3a ust. 1 zdanie trzecie ustawy o nadzorze nad rynkiem kapitałowym wyraźnie stanowi, że przekazanie KNF zgłoszenia naruszeń lub potencjalnych naruszeń przepisów ustawy o obrocie instrumentami finansowymi nie może stanowić przyczyny rozwiązania z osobą zgłaszającą umowy o pracę, umowy zlecenia, umowy o dzieło ani innej umowy o podobnym charakterze. Jest to mechanizm ochrony tzw. sygnalisty, zapewniający bezpieczeństwo osobom zgłaszającym nieprawidłowości.", "10": "Kodeks Dobrej Praktyki Domów Maklerskich nakłada na dom maklerski bezwzględny obowiązek informowania klienta o istniejących i potencjalnych czynnikach ryzyka wynikających z właściwości poszczególnych instrumentów finansowych. Obowiązek ten nie jest uzależniony od wniosku klienta (A) ani ograniczony do instrumentów niebędących PW (B). Ma charakter proaktywny – DM powinien z własnej inicjatywy informować klienta o ryzykach.", "11": "Statut ZMiD stanowi, że Sąd Dyscyplinarny może wystąpić do Komisji Nadzoru Finansowego – a nie do jej Urzędu (D) – o skreślenie z listy maklerów lub doradców albo o zawieszenie uprawnień do wykonywania zawodu, wskazując ustawowe przesłanki odpowiednio skreślenia lub zawieszenia. Wystąpienie do KNF, a nie do UKNF, jest istotnym rozróżnieniem, ponieważ KNF jest organem kolegialnym podejmującym decyzje w tych sprawach.", "12": "Art. 3 ust. 1 pkt 21 ustawy o rachunkowości definiuje rezerwy jako zobowiązania, których termin wymagalności lub kwota nie są pewne. Jest to klasyczna definicja rezerwy w polskiej rachunkowości, spójna z MSR 37. Opcja B opisuje zobowiązanie warunkowe (contingent liability), a nie rezerwę. Opcja C opisuje jednostkę współzależną, nie rezerwę. Opcja D jest błędna – rezerwy i aktywa z tyt. odroczonego podatku nie są instrumentami finansowymi.", "13": "Art. 306 KSH stanowi, że spółka akcyjna w organizacji powstaje – tj. zawiązuje się – z chwilą objęcia wszystkich akcji przez akcjonariuszy. Jest to moment, w którym spółka uzyskuje status podmiotu prawa (choć jeszcze bez wpisu do rejestru). Wymóg objęcia WSZYSTKICH akcji jest bezwzględny – objęcie 50% (B i D) lub tylko przez akcjonariusza większościowego (C i D) jest niewystarczające.", "14": "Ustawa o obrocie instrumentami finansowymi stanowi, że posiadacz rachunku zbiorczego przekazuje dane identyfikujące osoby uprawnione z PW zapisanych na rachunku zbiorczym oraz dane o liczbie i rodzaju PW na żądanie Komisji Nadzoru Finansowego albo Generalnego Inspektora Informacji Finansowej. Oba organy mają uprawnienie do żądania tych danych – opcja C ograniczająca to prawo tylko do KNF i opcja D tylko do GIIF są błędne.", "15": "Art. 8 §1 Kodeksu cywilnego stanowi, że każdy człowiek ma zdolność prawną od chwili urodzenia. Zdolność prawna jest kategorią obiektywną – powstaje automatycznie wraz z urodzeniem się dziecka żywego i nie jest związana z pełnoletnością, zawarciem małżeństwa ani żadnym innym zdarzeniem. Trwa do chwili śmierci.", "16": "MSSF 5 \"Aktywa trwałe przeznaczone do sprzedaży\" (par. 15) nakazuje wyceniać aktywa zaklasyfikowane jako przeznaczone do sprzedaży w kwocie niższej z: wartości bilansowej oraz wartości godziwej pomniejszonej o koszty sprzedaży (FVLCTS). Zasada ta chroni przed zawyżaniem wartości aktywów, które mają być zbyte – jeśli sprzedaż przyniesie mniej niż wartość bilansowa, odpis z tytułu utraty wartości jest ujmowany natychmiast.", "17": "Art. 18 ust. 1 ustawy Prawo dewizowe stanowi, że rezydenci i nierezydenci przekraczający granicę państwową Rzeczypospolitej Polskiej są obowiązani zgłaszać polskim organom celnym lub organom Straży Granicznej przywóz do i wywóz za granicę złota dewizowego lub platyny dewizowej. Obowiązek zgłoszenia jest związany z przekroczeniem granicy państwowej RP – nie granicy UE (C), i nie jest ograniczony do drogi lotniczej (B).", "18": "Ustawa o obrocie instrumentami finansowymi implementuje zasadę swobodnego świadczenia usług na rynku UE: podmiot prowadzący zagraniczny rynek regulowany z innego państwa UE może instalować systemy IT na terytorium RP bez zezwolenia KNF, pod warunkiem uprzedniego poinformowania KNF przez właściwy organ nadzoru kraju macierzystego, który udzielił temu podmiotowi zezwolenia na prowadzenie rynku regulowanego. Kluczowe jest, że informuje organ macierzysty – nie sam podmiot (C).", "19": "Art. 3 pkt 28a ustawy o obrocie instrumentami finansowymi definiuje tytuły uczestnictwa w instytucjach wspólnego inwestowania jako PW lub niebędące PW instrumenty finansowe reprezentujące prawa majątkowe uczestników tych instytucji, w tym w szczególności jednostki uczestnictwa funduszy inwestycyjnych. Słowo \"w szczególności\" oznacza, że katalog jest otwarty i obejmuje jednostki uczestnictwa – co wyklucza opcje B, C i D sugerujące ich wyłączenie.", "20": "Imienne świadectwo depozytowe potwierdza legitymację do realizacji uprawnień wynikających z papierów wartościowych wskazanych w jego treści, które nie są lub nie mogą być realizowane wyłącznie na podstawie zapisów na rachunku PW – z wyłączeniem prawa uczestnictwa w walnym zgromadzeniu. Istotą jest, że świadectwo służy do korzystania z uprawnień korporacyjnych innych niż uczestnictwo w WZA (do tego służy zapis na rachunku), np. do realizacji prawa poboru poza systemem depozytowym.", "21": "Art. 89 ust. 1 Prawa bankowego stanowi, że banki mogą emitować bankowe papiery wartościowe na warunkach podawanych do publicznej wiadomości. Oznacza to pełną transparentność warunków emisji – są one dostępne dla wszystkich, a nie tylko dla akcjonariuszy (C i D). Opcja B, twierdząca że banki nie mogą emitować BPW, jest oczywiście błędna.", "22": "Statut Związku Maklerów i Doradców stanowi, że najwyższym organem Związku jest Zjazd Maklerów i Doradców. Jest to organ uchwałodawczy, złożony ze wszystkich członków ZMiD, posiadający kompetencje do podejmowania najważniejszych decyzji dotyczących funkcjonowania Związku. Zarząd (B) jest organem wykonawczym, Komisja Rewizyjna (C) – kontrolnym, a Sąd Dyscyplinarny (D) – orzekającym.", "23": "MSR 38 par. 8 definiuje składnik wartości niematerialnych jako możliwy do zidentyfikowania niepieniężny składnik aktywów, nieposiadający postaci fizycznej. Możliwość zidentyfikowania oznacza, że składnik można wyodrębnić lub że wynika z praw umownych lub innych praw. Opcja B jest błędna – samo prawdopodobieństwo korzyści jest warunkiem koniecznym, ale niewystarczającym. Opcja C jest błędna – możliwy jest model przeszacowania lub kosztu. Opcja D jest błędna – marki własne nie są ujmowane jako WN.", "24": "Art. 309(2) KSH stanowi, że wpłaty na akcje SA w organizacji powinny być dokonane bezpośrednio lub za pośrednictwem firmy inwestycyjnej, na rachunek spółki w organizacji prowadzony przez bank na terytorium Unii Europejskiej lub państwa będącego stroną umowy o Europejskim Obszarze Gospodarczym. Dopuszczalne są oba sposoby wpłaty (bezpośrednio lub przez FI), a bank może być w całym EOG – nie tylko w Polsce (B).", "25": "Art. 3281 §1 KSH stanowi, że rejestr akcjonariuszy spółki akcyjnej prowadzi podmiot wybrany przez walne zgromadzenie spółki. Decyzja o wyborze podmiotu prowadzącego rejestr leży w gestii WZA – a nie zarządu (A) ani prezesa zarządu (C). Opcja D jest błędna, ponieważ wyboru dokonuje WZA na podstawie przepisów prawa, ale nie wynika z nich z góry, kto prowadzi rejestr – to właśnie WZA podejmuje tę decyzję.", "26": "Art. 27b ustawy o obrocie instrumentami finansowymi (implementacja MiFID II, zasada best execution) nakłada na firmy inwestycyjne obowiązek podejmowania wszelkich uzasadnionych działań w celu uzyskania najlepszego możliwego wyniku dla klienta, uwzględniając: cenę instrumentu finansowego, koszty wykonania zlecenia, czas zawarcia transakcji, prawdopodobieństwo zawarcia i rozliczenia transakcji, wielkość i charakter zlecenia. Katalog tych czynników jest kompleksowy – nie ogranicza się tylko do ceny i kosztów (B).", "27": "MSSF 10 par. 22 wymaga, aby jednostka dominująca prezentowała udziały niekontrolujące w skonsolidowanym sprawozdaniu z sytuacji finansowej w ramach kapitału własnego, oddzielnie od kapitału własnego właścicieli jednostki dominującej. Jest to fundamentalna zasada konsolidacji – udziały niekontrolujące są częścią kapitału własnego grupy, mimo że nie należą do właścicieli jednostki dominującej.", "28": "Art. 751 §1 KC stanowi, że zbycie przedsiębiorstwa powinno być dokonane w formie pisemnej z podpisami notarialnie poświadczonymi. Jest to forma szczególna – zwykła forma pisemna (B) jest niewystarczająca, a akt notarialny (D) byłby wymagany tylko wtedy, gdyby w skład przedsiębiorstwa wchodziły nieruchomości (co powoduje wymóg aktu notarialnego dla całej czynności). Standardowo wystarczą podpisy notarialnie poświadczone.", "29": "Ustawa o rachunkowości (art. 36 ust. 2e) stanowi, że w przypadku umorzenia akcji własnych dodatnią różnicę między wartością nominalną umorzonych akcji a ceną ich nabycia odnosi się na kapitał zapasowy. Jest to regulacja szczegółowa dotycząca rachunkowego ujęcia umorzenia akcji własnych – nadwyżka wartości nominalnej nad ceną nabycia jest \"zyskiem\" na transakcji, który trafia na kapitał zapasowy, a nie zwiększa wynik finansowy.", "30": "Art. 308 §1 KSH stanowi, że kapitał zakładowy spółki akcyjnej powinien wynosić co najmniej 100 000 złotych. Jest to minimalna kwota wymagana do zarejestrowania SA w Polsce. Opcja B (100 000 euro) byłaby kwotą zbyt wysoką i wyrażoną w obcej walucie, co byłoby sprzeczne z polskim systemem prawnym. Opcje C i D (10 000 zł/euro) odnoszą się do minimalnego kapitału sp. z o.o., nie SA."};
        const PASS_SCORE  = 40;
        const CORRECT_PTS = 2;
        const WRONG_PTS   = -1;

        let idx = 0;
        let ans = {};

        function display() {
            const q  = QUESTIONS[idx];
            const ak = JSON.parse(localStorage.getItem('answerKey')) || ANSWER_KEY;
            const selected = ans[idx];

            document.getElementById('currentQuestion').textContent = idx + 1;
            document.getElementById('progressFill').style.width =
                ((idx + 1) / QUESTIONS.length * 100) + '%';
            document.getElementById('questionText').textContent = q.text;

            let html = '';
            for (const [key, val] of Object.entries(q.options)) {
                const isSel  = selected === key;
                const cor    = ak[q.number];
                let cls = '';
                if (selected !== undefined && isSel)
                    cls = (key === cor) ? 'correct' : 'incorrect';

                const fb = (selected !== undefined && isSel)
                    ? `<span class="feedback">${key === cor ? '&#10003; Poprawnie' : '&#10007; Źle'}</span>`
                    : '';

                html += `
                    <div class="option ${cls} ${selected !== undefined ? 'answered' : ''}"
                         ${selected === undefined ? `data-key="${key}"` : ''}>
                        <span class="option-marker">${isSel ? (key === cor ? '&#10003;' : '&#10007;') : '&#9675;'}</span>
                        <span class="option-text">${key}: ${val}</span>
                        ${fb}
                    </div>`;
            }
            document.getElementById('optionsContainer').innerHTML = html;

            // Show explanation if wrong answer was selected
            const expBox = document.getElementById('explanationBox');
            if (selected !== undefined) {
                const cor = ak[q.number];
                if (selected !== cor && EXPLANATIONS[q.number]) {
                    expBox.innerHTML = '<span class="exp-label">Wyjaśnienie:</span> ' + EXPLANATIONS[q.number] + ' <em>Prawidłowa odpowiedź: <strong>' + cor + '</strong>.</em>';
                    expBox.classList.remove('hidden');
                } else {
                    expBox.innerHTML = '';
                    expBox.classList.add('hidden');
                }
            } else {
                expBox.innerHTML = '';
                expBox.classList.add('hidden');
            }

            document.getElementById('prevBtn').disabled = idx === 0;
            const last = idx === QUESTIONS.length - 1;
            document.getElementById('nextBtn').style.display   = last ? 'none'  : 'block';
            document.getElementById('finishBtn').style.display = last ? 'block' : 'none';
        }

        let pickLocked = false;
        function pick(key) {
            if (pickLocked) return;
            pickLocked = true;
            ans[idx] = key;
            display();
            setTimeout(() => { pickLocked = false; }, 300);
        }

        document.getElementById('prevBtn').addEventListener('click', function(e) {
            if (!e.isTrusted) return;
            if (idx > 0) { idx--; display(); }
        });
        document.getElementById('nextBtn').addEventListener('click', function(e) {
            if (!e.isTrusted) return;
            if (idx < QUESTIONS.length - 1) { idx++; display(); }
        });
        document.getElementById('finishBtn').addEventListener('click', function(e) {
            if (!e.isTrusted) return;
            finishQuiz();
        });

        document.getElementById('optionsContainer').addEventListener('click', function(e) {
            if (!e.isTrusted) return;
            const opt = e.target.closest('.option[data-key]');
            if (opt) pick(opt.dataset.key);
        });

        function finishQuiz() {
            const ak = JSON.parse(localStorage.getItem('answerKey')) || ANSWER_KEY;
            let correct = 0, wrong = 0, blank = 0;
            QUESTIONS.forEach((q, i) => {
                const u = ans[i], c = ak[q.number];
                if (!u) blank++; else if (u === c) correct++; else wrong++;
            });
            const score  = correct * CORRECT_PTS + wrong * WRONG_PTS;
            const max    = QUESTIONS.length * CORRECT_PTS;
            const passed = score >= PASS_SCORE;

            document.getElementById('resultStatus').textContent  = passed ? '✓ ZALICZONE' : '✗ NIEZALICZONE';
            document.getElementById('resultStatus').className    = 'result-status ' + (passed ? 'pass' : 'fail');
            document.getElementById('scoreDisplay').textContent  = score + ' / ' + max;
            document.getElementById('totalScore').textContent    = score;
            document.getElementById('correctCount').textContent  = correct;
            document.getElementById('correctPercent').textContent   = Math.round(correct / QUESTIONS.length * 100) + '%';
            document.getElementById('incorrectPercent').textContent = Math.round(wrong   / QUESTIONS.length * 100) + '%';
            document.getElementById('breakdownCorrect').textContent   = correct + ' × (+2) = +' + (correct * CORRECT_PTS);
            document.getElementById('breakdownIncorrect').textContent = wrong   + ' × (-1) = '  + (wrong * WRONG_PTS);
            document.getElementById('breakdownBlank').textContent     = blank   + ' × (0) = 0';

            document.getElementById('quizScreen').style.display    = 'none';
            document.getElementById('resultsScreen').style.display = 'block';
        }

        function retakeQuiz() {
            idx = 0; ans = {};
            document.getElementById('resultsScreen').style.display = 'none';
            document.getElementById('quizScreen').style.display    = 'block';
            display();
        }

        function exitQuiz() {
            if (confirm('Czy na pewno chcesz wyjść z quizu? Twój postęp zostanie utracony.'))
                window.location.href = '../index.html';
        }

        function goHome() { window.location.href = '../index.html'; }

        window.addEventListener('DOMContentLoaded', display);
    </script>
</body>
</html>
